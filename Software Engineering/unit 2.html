<!DOCTYPE html>
<html lang="en">

<head>

    <title>SE Unit 2 — Notes</title>
    <link

    <style>
        :root {
            --bg: #06080f;
            --surface: #0c0f1a;
            --card: #10141f;
            --border: #1a2035;
            --border2: #2a3350;
            --text: #e8eaf6;
            --muted: #5a6380;
            --muted2: #8892b0;
            --mono: "Space Mono", monospace;
            --body: "Plus Jakarta Sans", sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html {
            scroll-behavior: smooth
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body);
            min-height: 100vh;
            overflow-x: hidden
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(16, 185, 129, .07), transparent), linear-gradient(rgba(255, 255, 255, .012) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .012) 1px, transparent 1px);
            background-size: 100% 100%, 48px 48px, 48px 48px;
            pointer-events: none;
            z-index: 0
        }

        #home {
            position: relative;
            z-index: 1;
            padding: 48px 24px 100px;
            max-width: 1160px;
            margin: 0 auto
        }

        .hero {
            text-align: center;
            margin-bottom: 60px;
            padding-top: 16px
        }

        .eyebrow {
            font-family: var(--mono);
            font-size: 11px;
            color: #818cf8;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 18px;
            opacity: 0;
            animation: fu .6s ease .1s forwards

            font-size: clamp(28px, 5vw, 60px);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 16px;
            opacity: 0;
            animation: fu .6s ease .2s forwards
        }

        .grad {
            background: linear-gradient(135deg, #818cf8 0%, #38bdf8 45%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .hero p {
            font-size: 15px;
            color: var(--muted2);
            max-width: 520px;
            margin: 0 auto 28px;
            line-height: 1.75;
            opacity: 0;
            animation: fu .6s ease .3s forwards
        }

        .stats-row {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fu .6s ease .4s forwards
        }

        .stat-pill {
            font-family: var(--mono);
            font-size: 11px;
            padding: 5px 14px;
            border-radius: 20px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            color: var(--muted2)
        }

        .stat-pill span {
            color: #34d399;
            font-weight: 700
        }

        @keyframes fu {
            from {
                opacity: 0;
                transform: translateY(18px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .cat-section {
            margin-bottom: 36px
        }

        .cat-label {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .cat-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border)
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
            gap: 14px
        }

        .pat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: border-color .2s, transform .2s, box-shadow .2s;
            opacity: 0;
            animation: fu .5s ease forwards
        }

        .pat-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--c, #818cf8);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .3s ease
        }

        .pat-card:hover {
            border-color: var(--border2);
            transform: translateY(-3px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, .5)
        }

        .pat-card:hover::before {
            transform: scaleX(1)
        }

        .ptop {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px
        }

        .pnum {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted)
        }

        .pdiff {
            font-family: var(--mono);
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700
        }

        .db {
            background: rgba(56, 189, 248, .12);
            color: #38bdf8
        }

        .di {
            background: rgba(129, 140, 248, .12);
            color: #818cf8
        }

        .da {
            background: rgba(251, 113, 133, .12);
            color: #fb7185
        }

        .picon {
            font-size: 26px;
            margin-bottom: 10px
        }

        .pat-card h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 5px
        }

        .pat-card p {
            font-size: 12px;
            color: var(--muted2);
            line-height: 1.6
        }

        .pfoot {
            display: flex;
            gap: 6px;
            margin-top: 12px;
            flex-wrap: wrap
        }

        .ptag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, .05);
            color: var(--muted2);
            font-family: var(--mono)
        }

        .parr {
            position: absolute;
            bottom: 16px;
            right: 16px;
            font-size: 18px;
            color: var(--muted);
            opacity: 0;
            transition: opacity .2s, color .2s
        }

        .pat-card:hover .parr {
            opacity: 1;
            color: var(--c, #818cf8)
        }

        #lesson {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            overflow-y: auto
        }

        #lesson.show {
            display: block
        }

        .topbar {
            position: sticky;
            top: 0;
            background: rgba(6, 8, 15, .92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted2);
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            font-family: var(--body);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all .15s
        }

        .back-btn:hover {
            border-color: var(--border2);
            color: var(--text)
        }

        .breadcrumb {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1
        }

        .breadcrumb .cur {
            color: var(--c, #818cf8)
        }

        .lnav {
            display: flex;
            gap: 8px;
            margin-left: auto
        }

        .nav-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted2);
            padding: 6px 14px;
            cursor: pointer;
            font-size: 12px;
            font-family: var(--body);
            transition: all .15s
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--border2);
            color: var(--text)
        }

        .nav-btn:disabled {
            opacity: .3;
            cursor: not-allowed
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: var(--c, #818cf8);
            transition: width .3s ease;
            z-index: 999
        }

        .lbody {
            max-width: 940px;
            margin: 0 auto;
            padding: 40px 24px 80px
        }

        .lhead {
            margin-bottom: 28px
        }

        .lbadge {
            font-family: var(--mono);
            font-size: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--c, #818cf8);
            color: var(--c, #818cf8);
            background: rgba(129, 140, 248, .06);
            display: inline-block;
            margin-bottom: 14px;
            letter-spacing: 1px;
            text-transform: uppercase
        }

        .ltitle {
            font-size: clamp(24px, 4vw, 44px);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 10px
        }

        .ltitle .num {
            color: var(--c, #818cf8);
            opacity: .35;
            margin-right: 8px
        }

        .lsub {
            font-size: 14px;
            color: var(--muted2);
            line-height: 1.75;
            max-width: 640px
        }

        .cc {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 22px;
            margin-bottom: 20px
        }

        .sh {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px
        }

        .sh h2 {
            font-size: 17px;
            font-weight: 700
        }

        .sn {
            font-family: var(--mono);
            font-size: 10px;
            background: var(--c, #818cf8);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px
        }

        .bt {
            font-size: 13.5px;
            color: var(--muted2);
            line-height: 1.9
        }

        .bt b,
        .bt strong {
            color: var(--text)
        }

        .bt p {
            margin-bottom: 12px
        }

        .pl {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 7px;
            margin-top: 10px
        }

        .pl li {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            color: var(--muted2);
            line-height: 1.65
        }

        .pl li::before {
            content: "→";
            color: var(--c, #818cf8);
            font-family: var(--mono);
            font-size: 12px;
            flex-shrink: 0;
            margin-top: 2px
        }

        .pl li b,
        .pl li strong {
            color: var(--text)
        }

        .nl {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
            counter-reset: nl
        }

        .nl li {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 13px;
            color: var(--muted2);
            line-height: 1.65;
            counter-increment: nl
        }

        .nl li::before {
            content: counter(nl);
            font-family: var(--mono);
            font-size: 11px;
            background: var(--c, #818cf8);
            color: #000;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 700
        }

        .nl li b,
        .nl li strong {
            color: var(--text)
        }

        .myth-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px
        }

        .mi {
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border)
        }

        .mm {
            background: rgba(251, 113, 133, .08);
            border-bottom: 1px solid var(--border);
            padding: 10px 14px;
            font-size: 12.5px;
            color: #fb7185;
            font-weight: 600
        }

        .mf {
            background: rgba(52, 211, 153, .06);
            padding: 10px 14px;
            font-size: 12.5px;
            color: var(--muted2);
            line-height: 1.65
        }

        .mf b {
            color: #34d399
        }

        .tbl-wrap {
            overflow-x: auto;
            margin-top: 12px;
            border-radius: 8px;
            border: 1px solid var(--border)
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px
        }

        th {
            background: rgba(129, 140, 248, .1);
            color: #818cf8;
            font-family: var(--mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            text-align: left
        }

        td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--muted2);
            line-height: 1.6;
            vertical-align: top
        }

        tr:last-child td {
            border-bottom: none
        }

        tr:nth-child(even) td {
            background: rgba(255, 255, 255, .015)
        }

        td b,
        td strong {
            color: var(--text)
        }

        .lv {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px
        }

        .lvi {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .02)
        }

        .lvn {
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 700;
            color: #000;
            background: var(--c, #818cf8);
            border-radius: 6px;
            min-width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .lvname {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px
        }

        .lvd {
            font-size: 12px;
            color: var(--muted2);
            line-height: 1.6
        }

        .ph {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px
        }

        .phi {
            background: rgba(255, 255, 255, .02);
            border: 1px solid var(--border);
            border-left: 3px solid var(--c, #818cf8);
            border-radius: 0 8px 8px 0;
            padding: 12px 16px
        }

        .phtitle {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px
        }

        .phb {
            font-size: 12.5px;
            color: var(--muted2);
            line-height: 1.7
        }

        .phb b {
            color: var(--text)
        }

        .ag {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px
        }

        .abox {
            border-radius: 8px;
            padding: 14px;
            border: 1px solid var(--border)
        }

        .abox.g {
            background: rgba(52, 211, 153, .06);
            border-color: rgba(52, 211, 153, .2)
        }

        .abox.b {
            background: rgba(251, 113, 133, .06);
            border-color: rgba(251, 113, 133, .2)
        }

        .abox h4 {
            font-size: 11px;
            font-family: var(--mono);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px
        }

        .abox.g h4 {
            color: #34d399
        }

        .abox.b h4 {
            color: #fb7185
        }

        .abox ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .abox ul li {
            font-size: 12px;
            color: var(--muted2);
            line-height: 1.6;
            display: flex;
            align-items: flex-start;
            gap: 7px
        }

        .abox.g ul li::before {
            content: "✓";
            color: #34d399;
            font-weight: 700;
            flex-shrink: 0
        }

        .abox.b ul li::before {
            content: "✗";
            color: #fb7185;
            font-weight: 700;
            flex-shrink: 0
        }

        .doc-img {
            width: 100%;
            max-width: 620px;
            display: block;
            margin: 14px auto;
            border-radius: 8px;
            border: 1px solid var(--border)
        }

        .icap {
            text-align: center;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            margin-top: -6px;
            margin-bottom: 10px
        }

        .hl {
            background: rgba(129, 140, 248, .07);
            border-left: 3px solid var(--c, #818cf8);
            border-radius: 0 8px 8px 0;
            padding: 12px 16px;
            margin: 12px 0;
            font-size: 13px;
            color: var(--muted2);

        }

        .hl b {
            color: var(--text)
        }

        .cg {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px
        }

        .cbox {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            background: rgba(255, 255, 255, .02)
        }

        .cbox h4 {
            font-size: 11px;
            font-family: var(--mono);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            color: var(--c, #818cf8)
        }

        @media(max-width:600px) {
            .lbody {
                padding: 24px 14px 60px
            }

            .lnav .nav-btn span {
                display: none
            }

            .topbar {
                padding: 0 14px
            }

            .ag {
                grid-template-columns: 1fr
            }

            .cg {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<div class="cc">
  <div class="sh"><span class="sn">definition</span><h2>What are Software Requirements?</h2></div>
  <div class="bt"><p>According to <b>IEEE standard</b>, a requirement is defined as:</p></div>
  <ul class="pl">
    <li>A condition or capability needed by a user to solve a problem or achieve an objective.</li>
    <li>A condition or capability that must be met or possessed by a system or system component to satisfy a contract, standard, specification or other formally imposed documents.</li>

  <div class="hl"><b>Classification:</b> Properly classifying software requirements makes them easier to manage, prioritize, and track. It ensures all important aspects are considered during development.</div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">types</span><h2>Types of Software Requirements</h2></div>
  <div class="tag-row">
    <span class="tag">Functional Requirements</span>
    <span class="tag b">Non-Functional Requirements</span>
    <span class="tag p">Domain Requirements</span>
    <span class="tag o">User Requirements</span>
    <span class="tag">System Requirements</span>

</div>

<div class="cc">
  <div class="sh"><span class="sn">functional</span><h2>Functional Requirements</h2></div>
  <div class="bt"><p><strong>Functional requirements</strong> describe <em>what</em> the software should do. They define the functions or features that the system must have. Also called <b>Functional Specification</b>.</p></div>
  <div class="lv">
    <div class="lvi"><div class="lvn">Ex</div><div><div class="lvname">User Authentication</div><div class="lvd">The system must allow users to log in using a username and password.</div></div></div>
    <div class="lvi"><div class="lvn">Ex</div><div><div class="lvname">Search Functionality</div><div class="lvd">The software should enable users to search for products by name or category.</div></div></div>
    <div class="lvi"><div class="lvn">Ex</div><div><div class="lvname">Report Generation</div><div class="lvd">The system should be able to generate sales reports for a specified date range.</div></div></div>
  </div>
  <ul class="pl" style="margin-top:14px">
    <li>Visible directly in the final product (unlike non-functional requirements).</li>
    <li>Each high-level functional requirement may involve several interactions between the system and outside world.</li>
    <li>All scenarios must be enumerated to accurately describe functional requirements.</li>
    <li>Can be expressed in natural language, structured language, or formal specification language.</li>

<div class="cc">
  <div class="sh"><span class="sn">non-functional</span><h2>Non-Functional Requirements</h2></div>
  <div class="bt"><p><strong>Non-functional requirements (NFRs)</strong> describe <em>how</em> the software performs a task rather than what it should do. They define quality attributes, performance criteria, and constraints. Also called <b>non-behavioral requirements</b>.</p></div>
  <div class="grid2">
    <div class="gbox"><h4>Common NFR Areas</h4>
      <ul class="pl" style="margin-top:0">
        <li>Portability</li><li>Security</li><li>Maintainability</li>
        <li>Reliability</li><li>Scalability</li><li>Performance</li>
        <li>Reusability</li><li>Flexibility</li>
      </ul>
    </div>
    <div class="gbox"><h4>PPT — Additional NFRs</h4>
      <ul class="pl" style="margin-top:0">
        <li>Logging</li><li>Storage</li><li>Configuration</li>
        <li>Cost</li><li>Interoperability</li><li>Disaster Recovery</li>
        <li>Accessibility</li>
      </ul>
    </div>
  </div>
  <div class="bt" style="margin-top:14px"><p><b>Classified into two main categories:</b></p></div>
  <div class="lv">
    <div class="lvi"><div class="lvn">1</div><div><div class="lvname">Execution Qualities</div><div class="lvd">Things like security and usability — observable at <b>run time</b>.</div></div></div>
    <div class="lvi"><div class="lvn">2</div><div><div class="lvname">Evolution Qualities</div><div class="lvd">Things like testability, maintainability, extensibility, and scalability — embodied in the <b>static structure</b> of the software system.</div></div></div>
  </div>
  <div class="bt" style="margin-top:14px"><p><b>NFR Types:</b> Interface constraints, Performance constraints (response time, security, storage), Operating constraints, Life cycle constraints (maintainability, portability), Economic constraints.</p></div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">domain</span><h2>Domain Requirements</h2></div>
  <div class="bt"><p><strong>Domain requirements</strong> are specific to the domain or industry in which the software operates. They include terminology, rules, and standards relevant to that particular domain. Can be functional or nonfunctional.</p></div>
  <div class="lv">
    <div class="lvi"><div class="lvn">Ex</div><div><div class="lvname">Healthcare</div><div class="lvd">Software must comply with HIPAA regulations for handling patient data.</div></div></div>
    <div class="lvi"><div class="lvn">Ex</div><div><div class="lvname">Finance</div><div class="lvd">System should adhere to GAAP standards for financial reporting.</div></div></div>
    <div class="lvi"><div class="lvn">Ex</div><div><div class="lvname">E-commerce</div><div class="lvd">Software should support various payment gateways like PayPal, Stripe, and credit cards.</div></div></div>
  </div>
  <div class="hl"><b>Note:</b> Domain requirements are identified from the domain model and are not user-specific. Example: In academic software, the ability to access the list of faculty and students of each grade is a domain requirement.</div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">other</span><h2>Other Classifications of Requirements</h2></div>
  <ul class="nl">
    <li><b>User Requirements:</b> What the end-user wants — expressed in natural language, gathered through interviews, surveys, or feedback. Should be SMART (Specific, Measurable, Achievable, Relevant, Time-bound).</li>
    <li><b>System Requirements:</b> Technical characteristics — architecture, hardware, software components, interfaces. Used as basis for system design.</li>
    <li><b>Business Requirements:</b> Business goals and objectives — revenue, market share, customer satisfaction.</li>
    <li><b>Regulatory Requirements:</b> Legal/regulatory standards — data privacy, security, accessibility, legal compliance.</li>
    <li><b>Interface Requirements:</b> Interactions between the system and external systems — databases, web services, other software applications.</li>
    <li><b>Design Requirements:</b> Technical design — software architecture, data structures, algorithms, and technical aspects.</li>
  </ul>
</div>

  <div class="sh"><span class="sn">overview</span><h2>What is Requirements Engineering?</h2></div>
  <div class="bt"><p><strong>Requirements Engineering (RE)</strong> is the process of identifying, eliciting, analyzing, specifying, validating, and managing the needs and expectations of stakeholders for a software system.</p>
  <p>A systematic and strict approach to the definition, creation, and verification of requirements for a software system. Entails several tasks that help in understanding, recording, and managing the demands of stakeholders.</p></div>

  <div class="icap">Requirements Engineering — 5-Step Process</div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">step 1</span><h2>Feasibility Study</h2></div>
  <div class="bt"><p>The feasibility study concentrates on <b>5 key areas</b>. Economic Feasibility is the most important; Legal Feasibility is least considered.</p></div>
  <div class="ph">
    <div class="phi"><div class="phtitle">1. Technical Feasibility</div><div class="phb">Current resources (hardware + software) and required technology are analyzed to develop the project. Reports whether correct resources and technologies exist. Also analyzes technical skills, whether existing technology can be used, and if maintenance/upgradation is easy.</div></div>
    <div class="phi"><div class="phtitle">2. Operational Feasibility</div><div class="phb">Analyzes the degree of providing service to requirements and how easy the product will be to operate and maintain after deployment. Determines usability of the product and whether the suggested solution by the development team is acceptable.</div></div>
    <div class="phi"><div class="phtitle">3. Economic Feasibility ⭐ (Most Important)</div><div class="phb">Detailed analysis of cost and benefit. Includes all development costs: hardware/software resources, design/development costs, operational costs. Determines if the project will be financially beneficial for the organization.</div></div>
    <div class="phi"><div class="phtitle">4. Legal Feasibility</div><div class="phb">Ensures project complies with all relevant laws, regulations, and standards. Identifies legal constraints, reviews contracts and agreements, and considers intellectual property issues (patents, copyrights).</div></div>
    <div class="phi"><div class="phtitle">5. Schedule Feasibility</div><div class="phb">Evaluates project timeline to determine if it is realistic and achievable. Identifies significant milestones, establishes deadlines, assesses resource availability, and considers time constraints for timely completion.</div></div>
  </div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">step 2</span><h2>Requirements Elicitation</h2></div>
  <div class="bt"><p>Related to various ways used to <b>gain knowledge about the project domain and requirements</b>. Sources include customers, business manuals, existing similar software, standards, and other stakeholders.</p>
  <p>Elicitation does not produce formal models — it widens the analyst's domain knowledge and helps provide input to the next stage.</p></div>
  <div class="bt"><p><b>Techniques used:</b></p></div>
  <ul class="nl">
    <li><b>Interviews:</b> One-on-one conversations with stakeholders to gather information about their needs and expectations.</li>
    <li><b>Surveys:</b> Questionnaires distributed to stakeholders to gather information at scale.</li>
    <li><b>Focus Groups:</b> Small groups of stakeholders brought together to discuss needs and expectations.</li>
    <li><b>Observation:</b> Observing stakeholders in their work environment to gather information about their actual needs.</li>
    <li><b>Prototyping:</b> Creating a working model of the software to gather feedback and validate requirements.</li>
    <li><b>Brainstorming, Task Analysis, Delphi Technique</b></li>
  </ul>
  <div class="hl"><b>Important:</b> Document, organize, and prioritize all requirements from these techniques to ensure they are complete, consistent, and accurate.</div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">step 3</span><h2>Requirements Specification</h2></div>
  <div class="bt"><p>Produces <b>formal software requirement models</b>. All requirements — functional, non-functional, and constraints — are specified. Models used include ER diagrams, DFDs (Data Flow Diagrams), FDDs (Function Decomposition Diagrams), data dictionaries.</p>
  <p>Goal: Create a clear and comprehensive document understandable by both development team and stakeholders.</p></div>
  <div class="bt"><p><b>Types commonly specified:</b></p></div>
  <ul class="nl">
    <li><b>Functional Requirements:</b> What the system should do — input validation, data storage, user interface.</li>
    <li><b>Non-Functional Requirements:</b> How well the system does it — performance, reliability, usability, security.</li>
    <li><b>Constraints:</b> Limitations and restrictions that must be considered during development.</li>
    <li><b>Acceptance Criteria:</b> Conditions that must be met for the software to be considered complete and ready for release.</li>
  </ul>
  <div class="hl">Requirements should be written in natural language, using simple terms, avoiding technical jargon, and using a consistent format. Use diagrams, models, and visual aids to communicate effectively.</div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">step 4</span><h2>Requirements Verification and Validation (V&V)</h2></div>
  <div class="bt"><p>Process of checking that requirements are complete, consistent, and accurate and that they meet stakeholder needs.</p></div>
  <div class="grid2">
    <div class="gbox"><h4>Verification</h4>
      <p style="font-size:12px;color:var(--muted2);line-height:1.6">Ensures software <b>correctly implements</b> a specific function. Reviews requirements for clarity, testability, and freedom from errors. Reviewing documents, models, holding walkthroughs.</p>
    </div>
    <div class="gbox"><h4>Validation</h4>
      <p style="font-size:12px;color:var(--muted2);line-height:1.6">Ensures software <b>is traceable to customer requirements</b>. Tests requirements through simulation, prototypes, and final version testing.</p>
    </div>
  </div>
  <div class="bt" style="margin-top:14px"><p><b>Main steps for V&V:</b></p></div>
  <ul class="nl">
    <li>Requirements should be consistent — no two requirements should conflict with each other.</li>
    <li>Requirements should be complete in every sense.</li>
    <li>Requirements should be practically achievable.</li>
  </ul>
  <div class="hl"><b>Methods:</b> Reviews, buddy checks, making test cases. V&V is not a one-time process — it should be integrated throughout the software development process and even in maintenance stage. If requirements are not validated, errors propagate to successive stages causing lot of modification and rework.</div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">step 5</span><h2>Requirements Management</h2></div>
  <div class="bt"><p>Process of <b>analyzing, documenting, tracking, prioritizing, and agreeing on requirements</b> and controlling communication with stakeholders. Takes care of the changing nature of requirements.</p>
  <p>Ensures SRS is as modifiable as possible to incorporate changes specified by end users at later stages. Modifying software as per requirements in a systematic and controlled manner is extremely important.</p></div>
  <ul class="pl">
    <li>Track and control changes to requirements.</li>
    <li>Ensure requirements remain valid and relevant throughout the lifecycle.</li>
    <li>Ensure software system meets needs of stakeholders.</li>
    <li>Ensure development is on time, within budget, and to required quality.</li>
  </ul>
</div>
`},

                tagline: "Abstract representations of a system — showing different views using graphical notations like UML.",
                html: `
<div class="cc">
  <div class="sh"><span class="sn">definition</span><h2>What are System Models?</h2></div>
  <div class="bt"><p><strong>System models</strong> in software engineering are abstract representations of a software system, showing different views (context, interaction, structure, behavior) using graphical notations like UML. They help understand, design, and communicate functionality across lifecycle stages — from requirements to implementation.</p>
  <p>They provide blueprints for developers, help stakeholders visualize the system, explore ideas, and document existing or planned systems before extensive coding.</p></div>
  <div class="hl"><b>System modeling</b> is the process of developing abstract models of a system, with each model presenting a different view or perspective. Helps analysts understand functionality and communicate with customers.</div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">perspectives</span><h2>System Perspectives (from PPT)</h2></div>
  <div class="lv">
    <div class="lvi"><div class="lvn">1</div><div><div class="lvname">Context / External Perspective</div><div class="lvd">Model the context or environment of the system — what lies outside the system boundaries.</div></div></div>
    <div class="lvi"><div class="lvn">2</div><div><div class="lvname">Interaction Perspective</div><div class="lvd">Model the interactions between a system and its environment, or between components of a system.</div></div></div>
    <div class="lvi"><div class="lvn">3</div><div><div class="lvname">Structural Perspective</div><div class="lvd">Model the organization of a system or the structure of data processed by the system.</div></div></div>
    <div class="lvi"><div class="lvn">4</div><div><div class="lvname">Behavioral Perspective</div><div class="lvd">Model the dynamic behavior of the system and how it responds to events.</div></div></div>
  </div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">types</span><h2>Types of Models</h2></div>
  <div class="lv">
    <div class="lvi"><div class="lvn">C</div><div><div class="lvname">Context Models</div><div class="lvd">Show the system's boundary and its environment — defining what's inside and outside the system.</div></div></div>
    <div class="lvi"><div class="lvn">I</div><div><div class="lvname">Interaction Models</div><div class="lvd">Model how users or other systems interact with the software. Examples: Use Case Diagrams, Sequence Diagrams.</div></div></div>
    <div class="lvi"><div class="lvn">S</div><div><div class="lvname">Structural Models</div><div class="lvd">Depict the organization of the system — components or data structure. Example: Class Diagrams.</div></div></div>
    <div class="lvi"><div class="lvn">B</div><div><div class="lvname">Behavioral Models</div><div class="lvd">Illustrate the system's dynamic response to events or data. Examples: Activity Diagrams, State Diagrams.</div></div></div>
  </div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">uml</span><h2>UML Diagram Types (from PPT)</h2></div>
  <div class="ph">
    <div class="phi"><div class="phtitle">Activity Diagrams</div><div class="phb">Show the activities involved in a process or data processing.</div></div>
    <div class="phi"><div class="phtitle">Use Case Diagrams</div><div class="phb">Show the interactions between a system and its environment. Define functional requirements and user needs.</div></div>
    <div class="phi"><div class="phtitle">Sequence Diagrams</div><div class="phb">Show interactions between actors and the system and between system components. Illustrate order of messages exchanged over time, showing control flow.</div></div>
    <div class="phi"><div class="phtitle">Class Diagrams</div><div class="phb">Show the object classes in the system and the associations between these classes.</div></div>
    <div class="phi"><div class="phtitle">State Diagrams</div><div class="phb">Show how the system reacts to internal and external events. Model object states, events, and transitions.</div></div>
  </div>
  <div class="hl"><b>Why Use Graphical Models?</b><br/>• To facilitate discussion about existing or proposed system (incomplete/incorrect models are OK for discussion)<br/>• To document an existing system (accurate, not necessarily complete)<br/>• As detailed system description to generate implementation (must be correct and complete)</div>
</div>
`},

            {
                id: "context-models", num: "04", title: "Context Models", cat: "System Modeling", color: "#f97316", icon: "🗺️", diff: "b",
                tags: ["Boundary", "External Entities", "Scope"],
                tagline: "Define a system's boundaries and interactions with its environment — what's inside vs. outside.",
                html: `
<div class="cc">
  <div class="sh"><span class="sn">definition</span><h2>What are Context Models?</h2></div>
  <div class="bt"><p><strong>Context models</strong> define a system's boundaries and interactions with its environment, showing external entities (users, other systems) and data flows. Essential for understanding scope, dependencies, and communication in system design.</p>
  <p>A context model produces a formal or semi-formal description of the context information present in a context-aware system. Context is the <b>surrounding element for the system</b>, and a model provides the mathematical interface and behavioral description of the surrounding environment.</p>
  <p>From PPT: Context models are used to illustrate the operational context of a system — they show what lies <b>outside</b> the system boundaries. Social and organisational concerns may affect where to position system boundaries. Architectural models show the system and its relationship with other systems.</p></div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">key-aspects</span><h2>Key Aspects of Context Models</h2></div>
  <ul class="nl">
    <li><b>System Definition:</b> Show a central system within its broader environment — clarifying what's inside vs. outside.</li>
    <li><b>External Entities:</b> Identify users, other systems, data sources, or governing bodies that interact with the main system.</li>
    <li><b>Interactions:</b> Represent data, information, or physical object flows between the system and external entities.</li>
    <li><b>Communication Tool:</b> Simplify complex systems for stakeholders, helping to align understanding and define project scope early.</li>
    <li><b>Foundation for Design:</b> Serve as a starting point for detailed requirements, integration planning, and data architecture.</li>
  </ul>
</div>

<div class="cc">
  <div class="sh"><span class="sn">example</span><h2>MHC-PMS Context Example (from PPT)</h2></div>
  <div class="bt"><p>The <b>Mental Health Care – Patient Management System (MHC-PMS)</b> is a classic context model example. The system sits at the center; external entities around it include:</p></div>
  <ul class="pl">
    <li>Reception system (appointments)</li>
    <li>Pharmacy system (prescriptions)</li>
    <li>NHS medical records (patient data)</li>
    <li>Hospital wards (patient information)</li>
    <li>GP systems (referrals)</li>
  </ul>
  <div class="hl"><b>Process Perspective (PPT):</b> Context models simply show <em>other systems</em> in the environment, not how the system is used. Process models reveal how the system is used in <b>broader business processes</b>. UML activity diagrams may be used to define business process models.</div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">examples-in-field</span><h2>Examples of Context Models in Different Fields</h2></div>
  <div class="ph">
    <div class="phi"><div class="phtitle">UML — Systems Engineering</div><div class="phb">Defines context model as the physical scope of the system being designed — may include the user, environment, and other actors. A system context diagram represents this graphically.</div></div>
    <div class="phi"><div class="phtitle">Grammar Parsing</div><div class="phb">Context model defines the surrounding text of a lexical element — enables context-sensitive grammar with deterministic or stochastic rules.</div></div>
    <div class="phi"><div class="phtitle">Large Language Models (AI)</div><div class="phb">Context model focuses on understanding and incorporating contextual information from input text. In GPT-4 and BERT, it uses attention mechanisms and transformer architectures to capture contextual information.</div></div>
    <div class="phi"><div class="phtitle">AI Weather Forecasting</div><div class="phb">Systems like Google DeepMind's GraphCast, Huawei's Pangu Weather, and NVIDIA's FourCastNet apply context models — matching current conditions using past data as context.</div></div>
  </div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">definition</span><h2>What are Behavioral Models?</h2></div>
  <div class="bt"><p>A <strong>behavioral model</strong> describes a system's <b>dynamic aspects</b>, focusing on how it responds to events, user actions, or inputs over time — rather than just its static structure.</p>
  <p>Uses diagrams like Use Case, Sequence, State, and Activity Diagrams to visualize interactions, workflows, and object lifecycles for better understanding, communication, and early issue detection.</p>
  <p>From PPT: Behavioral models show what happens when a system responds to a stimulus from its environment. Two types of stimuli: <b>Data</b> (arrives to be processed) and <b>Events</b> (happen to trigger processing).</p></div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">types</span><h2>Key Types of Behavioral Models</h2></div>
  <div class="ph">
    <div class="phi"><div class="phtitle">Use Case Diagrams</div><div class="phb">Show interactions between users (actors) and the system, defining functional requirements and user needs.</div></div>
    <div class="phi"><div class="phtitle">Sequence Diagrams</div><div class="phb">Illustrate the order of messages exchanged between objects over time, showing control flow.</div></div>
    <div class="phi"><div class="phtitle">State Machine Diagrams (STD)</div><div class="phb">Model an object's states, events, and transitions — useful for complex workflows.</div></div>
    <div class="phi"><div class="phtitle">Activity Diagrams</div><div class="phb">Represent the flow of activities, decisions, and concurrent processes within a system. Model the processing of data where each activity represents one process step.</div></div>
    <div class="phi"><div class="phtitle">Data Flow Diagrams (DFDs)</div><div class="phb">Show how data moves and transforms as it passes through processes.</div></div>
  </div>
  <div class="hl"><b>From PPT:</b> Activity diagrams may be used to model the processing of data. State diagrams are used to model a system's behavior in response to internal or external events.</div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">std</span><h2>State Transition Diagram (STD)</h2></div>
  <div class="bt"><p>A <strong>State Transition Diagram</strong> represents the overall states that a system can have, and the events which cause a change in state. Behavioral Model uses STD to explain and represent behavior of a system.</p></div>
  <div class="hl"><b>Elevator Example:</b><br/>
  <b>Elevator Buttons:</b> Press button for floor → illumination starts → elevator moves to that floor → reaches floor → illumination canceled.<br/>
  <b>Floor Buttons:</b> Person on floor presses button → same process as elevator buttons.<br/>
  <b>No Request:</b> Elevator remains closed on current floor.</div>

  <div class="sh"><span class="sn">pros-cons</span><h2>Advantages & Disadvantages</h2></div>
  <div class="ag">
    <div class="abox g"><h4>Advantages</h4><ul>
      <li>Behavior and working of a system can easily be understood without effort.</li>
      <li>Results are more accurate by using this model.</li>
      <li>Requires less cost for development as resources can be minimal.</li>
      <li>Focuses on behavior rather than theories.</li>
    </ul></div>
    <div class="abox b"><h4>Disadvantages</h4><ul>
      <li>No theory — trainee cannot fully understand basic principles and major concepts.</li>
      <li>Cannot be fully automated.</li>
      <li>Sometimes difficult to understand overall result.</li>
      <li>Does not achieve maximum productivity due to technical issues.</li>
    </ul></div>
  </div>

  <div class="sh"><span class="sn">definition</span><h2>What is Data Modeling?</h2></div>
  <div class="bt"><p><strong>Data modelling</strong> is the process of creating a visual representation and abstraction of data structures, relationships, and rules within a system or organization. It provides a precise and well-organized framework for data organization and representation, enabling efficient analysis and decision-making.</p>
  <p><strong>Data models</strong> are visual representations of an enterprise's data elements and connections between them. They assist in defining and arranging data in the context of key business processes for creating successful information systems.</p></div>
</div>

  <div class="icap">Types of Data Models — Overview</div>
  <div class="lv">
    <div class="lvi"><div class="lvn">1</div><div><div class="lvname">Conceptual Data Model</div><div class="lvd">High-level, abstract business concepts and structures. Used in <b>early stages</b> to define business requirements.<br/><b>Purpose:</b> Organize and define business problems, rules, concepts.<br/><b>Focus:</b> High-level overview (customer data, market data, purchase data).<br/><b>Audience:</b> Business stakeholders and analysts.<br/><b>Example:</b> Understanding relationship between customers and orders before designing database structure.</div></div></div>
    <div class="lvi"><div class="lvn">2</div><div><div class="lvname">Logical Data Model</div><div class="lvd">Builds on conceptual model — provides detailed representation at logical level. <b>Independent of specific DBMS</b>.<br/><b>Purpose:</b> Define tables, columns, relationships, constraints.<br/><b>Focus:</b> Structure of data without depending on DBMS.<br/><b>Audience:</b> Data architects and analysts.<br/><b>Example:</b> Outlining schema, relationships, rules for customer and order data to guide physical database design.</div></div></div>
    <div class="lvi"><div class="lvn">3</div><div><div class="lvname">Physical Data Model</div><div class="lvd">Represents implementation in a <b>specific database system</b>.<br/><b>Purpose:</b> Define every element to construct database — tables, columns, keys, constraints (PK, FK, NOT NULL).<br/><b>Focus:</b> Actual implementation using queries and DBMS features.<br/><b>Audience:</b> Developers and DBAs.<br/><b>Example:</b> Creating database schema, enforcing all constraints and relationships.</div></div></div>
  </div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">process</span><h2>Data Modeling Process — 5 Steps</h2></div>
  <ul class="nl">
    <li><b>Identifying Data Sources:</b> Identify and examine data sources (internal and external). Ensures comprehensive framework by gathering all relevant data.</li>
    <li><b>Defining Entities and Attributes:</b> Identify entities (Customer, Product) and their attributes (Customer Name, Product Price). Establishes organized structure for understanding data.</li>
    <li><b>Mapping Relationships:</b> Define associations between entities — including nature and cardinality (one-to-one, one-to-many, many-to-many). Captures interdependencies within data.</li>
    <li><b>Choosing a Model Type:</b> Select appropriate model — conceptual, logical, physical, relational, or object-oriented. Determines level of abstraction and detail.</li>
    <li><b>Implementing and Maintaining:</b> Convert logical/physical model into database schema. Create tables, define constraints. Ongoing maintenance to reflect business and technology changes.</li>
  </ul>
</div>

<div class="cc">
  <div class="sh"><span class="sn">modeling-types</span><h2>5 Types of Data Modeling</h2></div>
  <div class="ph">

    <div class="phi"><div class="phtitle">2. Relational Model</div><div class="phb">Represents data as rows and columns in tables. Links between tables via relationships. Strongly related to RDBMS. Frequently used in database design.</div></div>
    <div class="phi"><div class="phtitle">3. Object-Oriented Data Model</div><div class="phb">Data represented as objects (similar to OOP). Creating objects with stored values. Supports data abstraction, inheritance, and encapsulation. Facilitates communication.</div></div>
    <div class="phi"><div class="phtitle">4. Network Model</div><div class="phb">Versatile approach to represent objects and relationships. Has a schema — graph representation of data. Items stored in nodes; relationships as edges. Supports many parent and child records.</div></div>
    <div class="phi"><div class="phtitle">5. ER Model (Entity-Relationship Model)</div><div class="phb">High-level relational model specifying data elements and relationships. Provides easier-to-understand perspective on facts. Uses ER diagram (entities, attributes, relationships). Mapping cardinality: One-to-One, One-to-Many, Many-to-One, Many-to-Many.</div></div>
  </div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">benefits</span><h2>Benefits of Data Modeling</h2></div>
  <ul class="pl">
    <li>Visualizes complex data structures — clear roadmap for understanding relationships.</li>
    <li>Acts as universal language — fosters communication between business and technical stakeholders.</li>
    <li>Creates organized databases by defining entities, properties, and relationships.</li>
    <li>Enhances data quality and integrity by reducing anomalies and redundancy through normalization.</li>
    <li>Minimizes errors in database and application development.</li>
    <li>Ensures consistency in documentation and system designs across organization.</li>
    <li>Improves database and application performance.</li>
    <li>Facilitates quick correlation of data across the company.</li>
    <li>Strengthens communication between business intelligence and development teams.</li>
  </ul>
</div>

<div class="cc">
  <div class="sh"><span class="sn">definition</span><h2>What is OMT?</h2></div>
  <div class="bt"><p><strong>Object Modeling Technique (OMT)</strong> is a real-world-based modeling approach for software modeling and designing. It is one of the most popular object-oriented development techniques used nowadays.</p></div>
  <ul class="nl">
    <li>Developed as a method to develop <b>object-oriented systems</b> and to support OOP.</li>
    <li>Describes the <b>static structure</b> of the system.</li>
    <li>Used in telecommunication, transportation, compilers, and many real-world problems.</li>
    <li>Developed by <b>James Rambaugh</b>.</li>
  </ul>
</div>

<div class="cc">
  <div class="sh"><span class="sn">purpose</span><h2>Purpose of OMT</h2></div>
  <ul class="nl">
    <li>To test physical entities before construction.</li>
    <li>To make communication easier with customers.</li>
    <li>To present information in an alternative way — visualization.</li>
    <li>To reduce the complexity of software.</li>
    <li>To solve real-world problems.</li>
  </ul>
</div>

<div class="cc">
  <div class="sh"><span class="sn">models</span><h2>3 Models in OMT</h2></div>
  <div class="lv">
    <div class="lvi"><div class="lvn">1</div><div><div class="lvname">Object Model</div><div class="lvd">Encompasses abstraction, encapsulation, modularity, hierarchy, typing, concurrency, and persistence. Emphasizes on <b>object</b> and <b>class</b>. Main concepts: classes and their association with attributes. Predefined relationships: <b>aggregation</b> and <b>generalization</b> (multiple inheritance).</div></div></div>
    <div class="lvi"><div class="lvn">2</div><div><div class="lvname">Dynamic Model</div><div class="lvd">Involves <b>states, events, and state diagram</b> (transition diagram). Main concepts: states, transition between states, events to trigger transitions. Predefined relationships: aggregation (concurrency) and generalization.</div></div></div>
    <div class="lvi"><div class="lvn">3</div><div><div class="lvname">Functional Model</div><div class="lvd">Focuses on <b>how data is flowing</b>, where data is stored, and different processes. Main concepts: data, data flow, data store, process, and actors. Describes processes and actions using <b>Data Flow Diagram (DFD)</b>.</div></div></div>
  </div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">phases</span><h2>4 Phases of OMT</h2></div>
  <div class="ph">
    <div class="phi"><div class="phtitle">1. Analysis</div><div class="phb">First phase. Preparation of precise and correct modelling of real-world problems. Starts with setting a goal — finding the problem statement. Problem statement divided into three models (object, dynamic, functional).</div></div>
    <div class="phi"><div class="phtitle">2. System Design</div><div class="phb">Second phase — comes after analysis. Determines all system architecture, concurrent tasks, and data storage. High-level architecture of the system is designed during this phase.</div></div>
    <div class="phi"><div class="phtitle">3. Object Design</div><div class="phb">Third phase — after system design. Concerned with classification of objects into different classes, attributes, and necessary operations. Checks different issues related to generalization and aggregation.</div></div>
    <div class="phi"><div class="phtitle">4. Implementation</div><div class="phb">Last phase. Converting prepared design into software. Design phase is translated into the Implementation phase.</div></div>
  </div>
</div>

  <div class="icap">SRS Document — Structure Overview</div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">section-1</span><h2>Section 1: Introduction</h2></div>
  <ul class="pl">
    <li><b>Purpose:</b> What the software aims to achieve.</li>
    <li><b>Scope:</b> Boundaries, goals, and objectives.</li>
    <li><b>Definitions & Acronyms:</b> Key terminology.</li>
    <li><b>Audience:</b> Who the document is for and who the end-users are.</li>
  </ul>
</div>

<div class="cc">
  <div class="sh"><span class="sn">section-2</span><h2>Section 2: Overall Description</h2></div>
  <ul class="pl">
    <li><b>Product Perspective:</b> How it fits into existing systems.</li>
    <li><b>User Needs:</b> What the users need to accomplish.</li>
    <li><b>Assumptions & Dependencies:</b> Factors influencing the project.</li>
    <li><b>Constraints:</b> Limitations (e.g., budget, hardware).</li>
  </ul>
</div>

<div class="cc">
  <div class="sh"><span class="sn">section-3</span><h2>Section 3: Specific Requirements</h2></div>
  <div class="lv">
    <div class="lvi"><div class="lvn">FR</div><div><div class="lvname">Functional Requirements</div><div class="lvd">Detailed features, inputs, outputs, system behavior — often described as use cases or user stories.</div></div></div>
    <div class="lvi"><div class="lvn">EI</div><div><div class="lvname">External Interface Requirements</div><div class="lvd">User interfaces (UI/UX), hardware, software, and communication interfaces.</div></div></div>
    <div class="lvi"><div class="lvn">NF</div><div><div class="lvname">Non-Functional Requirements (System Qualities)</div><div class="lvd">Performance, security, reliability, scalability, availability, maintainability.</div></div></div>
    <div class="lvi"><div class="lvn">DR</div><div><div class="lvname">Data Requirements</div><div class="lvd">Data models, dictionaries, storage, and manipulation needs.</div></div></div>
    <div class="lvi"><div class="lvn">BR</div><div><div class="lvname">Business Rules</div><div class="lvd">Specific directives guiding system behavior.</div></div></div>
    <div class="lvi"><div class="lvn">DC</div><div><div class="lvname">Design Constraints</div><div class="lvd">Technical and other constraints on the design of the system.</div></div></div>
  </div>
</div>

<div class="cc">
  <div class="sh"><span class="sn">section-4</span><h2>Section 4: Appendices</h2></div>
  <ul class="pl">
    <li>Glossary of terms</li>
    <li>Diagrams (Use Case, Sequence)</li>
    <li>Data models and data dictionaries</li>
    <li>Other supporting documents</li>
  </ul>
  <div class="hl"><b>Key principle:</b> This structure ensures clarity, completeness, and verifiability for all stakeholders. The SRS acts as a <b>contract</b> — any future dispute between customers and developers can be settled by examining the SRS document.</div>
</div>
`},

        ];


        const CATS = {
            "Requirements": ["sw-requirements", "req-engineering", "srs-structure"],
            "System Modeling": ["system-models", "context-models", "behavioral-models", "data-models", "object-models"]
        };
        const DESCS = {
            "sw-requirements": "IEEE-defined: Functional, Non-Functional, Domain, User, System, Business requirements.",
            "req-engineering": "5-step process: Feasibility → Elicitation → Specification → V&V → Management.",
            "srs-structure": "SRS document: Introduction, Overall Description, Specific Requirements, Appendices.",
            "system-models": "Abstract representations using UML — 4 perspectives: Context, Interaction, Structural, Behavioral.",
            "context-models": "Define system boundaries and interactions with external environment and entities.",
            "behavioral-models": "Dynamic behavior using State Transition Diagrams, Activity, Sequence, and Use Case diagrams.",
            "data-models": "Conceptual, Logical, Physical — plus 5 types: Hierarchical, Relational, OO, Network, ER.",
            "object-models": "OMT by James Rambaugh — Object, Dynamic, Functional models across 4 phases."
        };

        function renderHome() {
            const c = document.getElementById("cards-container");
            let h = "";
            Object.entries(CATS).forEach(([cat, ids]) => {
                h += `<div class="cat-section"><div class="cat-label">${cat}</div><div class="grid">`;
                ids.forEach((id, i) => {
                    const p = PATTERNS.find(x => x.id === id);
                    if (!p) return;
                    h += `<div class="pat-card" style="--c:${p.color};animation-delay:${i * 0.08}s" onclick="openLesson('${p.id}')">
        <div class="ptop"><span class="pnum">${p.num}</span><span class="pdiff ${p.diff === 'b' ? 'db' : p.diff === 'i' ? 'di' : 'da'}">${p.diff === 'b' ? 'Beginner' : p.diff === 'i' ? 'Intermediate' : 'Advanced'}</span></div>
        <div class="picon">${p.icon}</div>
        <h3>${p.title}</h3><p>${DESCS[p.id] || p.tagline}</p>
        <div class="pfoot">${p.tags.map(t => `<span class="ptag">${t}</span>`).join('')}</div>
        <span class="parr">→</span>
      </div>`;
                });
                h += "</div></div>";
            });
            c.innerHTML = h;
        }

        let curIdx = 0;
        function openLesson(id) {
            const idx = PATTERNS.findIndex(p => p.id === id);
            curIdx = idx;
            renderLesson(PATTERNS[idx]);
            document.getElementById("lesson").classList.add("show");
            document.getElementById("lesson").scrollTop = 0;
            updateNav();
        }
        function goHome() { document.getElementById("lesson").classList.remove("show") }
        function navigate(d) {
            const ni = curIdx + d;
            if (ni < 0 || ni >= PATTERNS.length) return;
            curIdx = ni;
            renderLesson(PATTERNS[curIdx]);
            document.getElementById("lesson").scrollTop = 0;
            updateNav();
        }
        function updateNav() {
            document.getElementById("prev-btn").disabled = curIdx === 0;
            document.getElementById("next-btn").disabled = curIdx === PATTERNS.length - 1;
        }
        function renderLesson(p) {
            document.getElementById("lbc").textContent = p.title;
            document.querySelector(".progress-bar").style.cssText = `--c:${p.color};width:${((curIdx + 1) / PATTERNS.length * 100)}%`;
            document.getElementById("lc").innerHTML = `
    <div class="lhead">
      <div class="lbadge" style="--c:${p.color}">${p.cat}</div>
      <div class="ltitle"><span class="num">${p.num}</span>${p.title}</div>
      <div class="lsub">${p.tagline}</div>
    </div>
    ${p.html}
  `;
            document.querySelectorAll(".sn").forEach(el => el.style.background = p.color);
            document.querySelectorAll(".phi").forEach(el => el.style.borderLeftColor = p.color);
            document.querySelectorAll(".lvi .lvn").forEach(el => el.style.background = p.color);
        }
        document.getElementById("lesson").addEventListener("scroll", function () {
            const pct = this.scrollTop / (this.scrollHeight - this.clientHeight) * 100;
            document.querySelector(".progress-bar").style.width = pct + "%";
        });
        renderHome();
    </script>
