<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Patterns — Learn by Doing</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0f111a;
            --surface: #151924;
            --card: #181d2a;
            --border: #232a3e;
            --border2: #333d5a;
            --text: #ffffff;
            --muted: #8b96b5;
            --muted2: #b4bed4;
            --mono: 'Space Mono', monospace;
            --display: 'Plus Jakarta Sans', sans-serif;
            --body: 'Plus Jakarta Sans', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html {
            scroll-behavior: smooth
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body);
            min-height: 100vh;
            overflow-x: hidden
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.08), transparent), linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 100% 100%, 48px 48px, 48px 48px;
            pointer-events: none;
            z-index: 0
        }

        /* ═══ HOME ═══ */
        #home {
            position: relative;
            z-index: 1;
            padding: 48px 24px 100px;
            max-width: 1160px;
            margin: 0 auto
        }

        .home-hero {
            text-align: center;
            margin-bottom: 64px;
            padding-top: 16px
        }

        .eyebrow {
            font-family: var(--mono);
            font-size: 14px;
            color: #818cf8;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 18px;
            opacity: 0;
            animation: fadeUp .6s ease .1s forwards
        }

        .home-hero h1 {
            font-size: clamp(34px, 6vw, 68px);
            font-weight: 800;
            line-height: 1.08;
            margin-bottom: 18px;
            opacity: 0;
            animation: fadeUp .6s ease .2s forwards
        }

        .grad {
            background: linear-gradient(135deg, #818cf8 0%, #38bdf8 40%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .home-hero p {
            font-size: 21px;
            color: var(--muted2);
            max-width: 540px;
            margin: 0 auto 32px;
            line-height: 1.75;
            opacity: 0;
            animation: fadeUp .6s ease .3s forwards
        }

        .stats-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeUp .6s ease .4s forwards
        }

        .stat-pill {
            font-family: var(--mono);
            font-size: 14px;
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: var(--muted2)
        }

        .stat-pill span {
            color: #818cf8;
            font-weight: 700
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* CATEGORY */
        .cat-section {
            margin-bottom: 40px
        }

        .cat-label {
            font-family: var(--mono);
            font-size: 15px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .cat-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border)
        }

        .patterns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 14px
        }

        /* PATTERN CARD */
        .pat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: border-color .2s, transform .2s, box-shadow .2s;
            opacity: 0;
            animation: fadeUp .5s ease forwards
        }

        .pat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--c, #818cf8);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .3s ease
        }

        .pat-card:hover {
            border-color: var(--border2);
            transform: translateY(-3px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, .5)
        }

        .pat-card:hover::before {
            transform: scaleX(1)
        }

        .pat-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px
        }

        .pat-num {
            font-family: var(--mono);
            font-size: 15px;
            color: var(--muted)
        }

        .pat-difficulty {
            font-family: var(--mono);
            font-size: 15px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700
        }

        .diff-b {
            background: rgba(56, 189, 248, 0.12);
            color: #38bdf8
        }

        .diff-i {
            background: rgba(129, 140, 248, 0.12);
            color: #818cf8
        }

        .diff-a {
            background: rgba(251, 113, 133, 0.12);
            color: #fb7185
        }

        .pat-icon {
            font-size: 36px;
            margin-bottom: 10px
        }

        .pat-card h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px
        }

        .pat-card p {
            font-size: 16px;
            color: var(--muted2);
            line-height: 1.6
        }

        .pat-card-footer {
            display: flex;
            gap: 6px;
            margin-top: 14px;
            flex-wrap: wrap
        }

        .pat-tag {
            font-size: 15px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted2);
            font-family: var(--mono)
        }

        .pat-arrow {
            position: absolute;
            bottom: 18px;
            right: 18px;
            font-size: 23px;
            color: var(--muted);
            opacity: 0;
            transition: opacity .2s, color .2s
        }

        .pat-card:hover .pat-arrow {
            opacity: 1;
            color: var(--c, #818cf8)
        }

        /* ═══ LESSON ═══ */
        #lesson {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            overflow-y: auto
        }

        #lesson.show {
            display: block
        }

        .lesson-topbar {
            position: sticky;
            top: 0;
            background: rgba(6, 8, 15, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted2);
            padding: 6px 14px;
            cursor: pointer;
            font-size: 17px;
            font-family: var(--body);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all .15s
        }

        .back-btn:hover {
            border-color: var(--border2);
            color: var(--text)
        }

        .lesson-breadcrumb {
            font-family: var(--mono);
            font-size: 14px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1
        }

        .lesson-breadcrumb .current {
            color: var(--c, #818cf8)
        }

        .lesson-nav {
            display: flex;
            gap: 8px;
            margin-left: auto
        }

        .nav-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted2);
            padding: 6px 14px;
            cursor: pointer;
            font-size: 16px;
            font-family: var(--body);
            transition: all .15s
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--border2);
            color: var(--text)
        }

        .nav-btn:disabled {
            opacity: .3;
            cursor: not-allowed
        }

        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: var(--c, #818cf8);
            transition: width .3s ease;
            z-index: 999
        }

        .lesson-body {
            max-width: 920px;
            margin: 0 auto;
            padding: 40px 24px 80px
        }

        .lesson-header {
            margin-bottom: 32px
        }

        .lesson-cat-badge {
            font-family: var(--mono);
            font-size: 15px;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--c, #818cf8);
            color: var(--c, #818cf8);
            background: rgba(129, 140, 248, 0.06);
            display: inline-block;
            margin-bottom: 14px;
            letter-spacing: 1px;
            text-transform: uppercase
        }

        .lesson-title {
            font-size: clamp(26px, 5vw, 46px);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 10px
        }

        .lesson-title .num {
            color: var(--c, #818cf8);
            opacity: .35;
            margin-right: 8px
        }

        .lesson-tagline {
            font-size: 20px;
            color: var(--muted2);
            line-height: 1.75;
            max-width: 620px
        }

        /* COMPLEXITY */
        .complexity-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding: 16px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 28px
        }

        .cx {
            display: flex;
            flex-direction: column;
            gap: 3px
        }

        .cx-label {
            font-family: var(--mono);
            font-size: 15px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .cx-val {
            font-family: var(--mono);
            font-size: 17px;
            font-weight: 700;
            color: var(--c, #818cf8)
        }

        .cx-divider {
            width: 1px;
            background: var(--border);
            margin: 0 4px
        }

        /* CONCEPT */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px
        }

        .section-header h2 {
            font-size: 23px;
            font-weight: 700
        }

        .section-num {
            font-family: var(--mono);
            font-size: 15px;
            background: var(--c, #818cf8);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px
        }

        .concept-block {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 28px
        }

        .concept-text {
            font-size: 18px;
            color: var(--muted2);
            line-height: 1.9;
            margin-bottom: 16px
        }

        .concept-text b {
            color: var(--text)
        }

        .when-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px
        }

        @media(max-width:600px) {
            .when-grid {
                grid-template-columns: 1fr
            }
        }

        .when-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 16px;
            color: var(--muted2)
        }

        .when-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--c, #818cf8);
            flex-shrink: 0;
            margin-top: 4px
        }

        /* PIPELINE VIZ */
        .pipeline {
            display: flex;
            align-items: center;
            gap: 0;
            flex-wrap: wrap;
            margin: 16px 0;
            row-gap: 10px
        }

        .pipe-node {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            font-family: var(--mono);
            font-size: 14px;
            color: var(--muted2);
            white-space: nowrap;
            transition: all .3s
        }

        .pipe-node.active {
            border-color: var(--c, #818cf8);
            color: var(--c, #818cf8);
            background: rgba(129, 140, 248, 0.08);
            transform: translateY(-2px)
        }

        .pipe-arrow {
            color: var(--muted);
            font-size: 18px;
            padding: 0 6px;
            flex-shrink: 0
        }

        /* EXAMPLE TABS */
        .examples-section {
            margin-bottom: 28px
        }

        .example-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap
        }

        .ex-tab {
            font-family: var(--mono);
            font-size: 14px;
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--muted);
            cursor: pointer;
            transition: all .15s
        }

        .ex-tab.active {
            border-color: var(--c, #818cf8);
            color: var(--c, #818cf8);
            background: rgba(129, 140, 248, 0.06)
        }

        .example-panel {
            display: none
        }

        .example-panel.active {
            display: block
        }

        .ex-problem {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--c, #818cf8);
            border-radius: 0 8px 8px 0;
            padding: 14px 16px;
            margin-bottom: 20px
        }

        .ex-problem .q-label {
            font-family: var(--mono);
            font-size: 15px;
            color: var(--c, #818cf8);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px
        }

        .ex-problem .q-text {
            font-size: 17px;
            color: var(--text);
            line-height: 1.6
        }

        .ex-problem .q-io {
            font-family: var(--mono);
            font-size: 14px;
            color: var(--muted2);
            margin-top: 8px
        }

        /* STEPPER */
        .stepper {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 16px
        }

        .stepper-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .stepper-title {
            font-family: var(--mono);
            font-size: 14px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .stepper-counter {
            font-family: var(--mono);
            font-size: 16px;
            color: var(--muted)
        }

        .step-counter-num {
            color: var(--c, #818cf8);
            font-weight: 700
        }

        .stepper-viz {
            padding: 20px 18px;
            min-height: 110px
        }

        .stepper-desc {
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--border);
            font-size: 17px;
            color: var(--muted2);
            line-height: 1.65
        }

        .stepper-controls {
            padding: 12px 18px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px
        }

        .step-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 7px 18px;
            cursor: pointer;
            font-size: 16px;
            font-family: var(--body);
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .step-btn:hover:not(:disabled) {
            border-color: var(--c, #818cf8);
            color: var(--c, #818cf8)
        }

        .step-btn:disabled {
            opacity: .3;
            cursor: not-allowed
        }

        .step-dots {
            display: flex;
            gap: 6px;
            margin-left: auto
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: background .2s
        }

        .step-dot.active {
            background: var(--c, #818cf8)
        }

        /* VIZ COMPONENTS */
        .doc-viz {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .doc-block {
            border-radius: 6px;
            padding: 8px 12px;
            font-family: var(--mono);
            font-size: 14px;
            transition: all .3s;
            border: 1px solid var(--border);
            color: var(--muted2);
            background: var(--surface)
        }

        .doc-block.active {
            border-color: var(--c, #818cf8);
            color: var(--c, #818cf8);
            background: rgba(129, 140, 248, 0.07);
            transform: translateX(4px)
        }

        .doc-block.done {
            border-color: rgba(52, 211, 153, 0.4);
            color: #34d399;
            background: rgba(52, 211, 153, 0.06)
        }

        .doc-block.warn {
            border-color: rgba(251, 191, 36, 0.4);
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.06)
        }

        .doc-block.bad {
            border-color: rgba(251, 113, 133, 0.4);
            color: #fb7185;
            background: rgba(251, 113, 133, 0.06)
        }

        .chunk-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: flex-start
        }

        .chunk {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            font-family: var(--mono);
            font-size: 15px;
            color: var(--muted2);
            max-width: 160px;
            line-height: 1.5;
            transition: all .3s;
            background: var(--surface)
        }

        .chunk.active {
            border-color: var(--c, #818cf8);
            color: var(--c, #818cf8);
            background: rgba(129, 140, 248, 0.08)
        }

        .chunk.overlap {
            border-color: rgba(251, 191, 36, 0.5);
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.06)
        }

        .embed-row {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap
        }

        .embed-cell {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 15px;
            font-weight: 700;
            transition: all .3s
        }

        .score-row {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            transition: all .3s
        }

        .score-item.active {
            border-color: var(--c, #818cf8);
            background: rgba(129, 140, 248, 0.06)
        }

        .score-item.top {
            border-color: rgba(52, 211, 153, 0.5);
            background: rgba(52, 211, 153, 0.06)
        }

        .score-bar {
            height: 8px;
            border-radius: 4px;
            background: var(--c, #818cf8);
            transition: width .4s ease;
            min-width: 4px
        }

        .score-label {
            font-family: var(--mono);
            font-size: 15px;
            color: var(--muted2);
            flex: 1
        }

        .score-val {
            font-family: var(--mono);
            font-size: 15px;
            color: var(--c, #818cf8);
            width: 40px;
            text-align: right
        }

        .info-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px
        }

        .info-badge {
            font-family: var(--mono);
            font-size: 15px;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: var(--muted2)
        }

        .info-badge span {
            color: var(--c, #818cf8)
        }

        .result-box {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(52, 211, 153, 0.06);
            border: 1px solid rgba(52, 211, 153, 0.2);
            border-radius: 8px;
            margin-top: 12px
        }

        .result-label {
            font-family: var(--mono);
            font-size: 15px;
            color: #34d399;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            margin-top: 2px
        }

        .result-val {
            font-size: 17px;
            color: #34d399;
            line-height: 1.6
        }

        /* CODE */
        .code-section {
            margin-bottom: 28px
        }

        .code-box {
            background: #050710;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02)
        }

        .code-lang {
            font-family: var(--mono);
            font-size: 15px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .copy-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            font-size: 14px;
            padding: 3px 10px;
            cursor: pointer;
            font-family: var(--mono);
            transition: all .15s
        }

        .copy-btn:hover {
            border-color: var(--border2);
            color: var(--text)
        }

        pre {
            font-family: var(--mono);
            font-size: 15px;
            padding: 18px;
            overflow-x: auto;

        const PATTERNS = [

            /* ─── 01 RAG OVERVIEW ─── */
            {
                id: 'rag-overview', num: '01', title: 'RAG Overview',
                cat: 'Foundations', color: '#818cf8', icon: '🧠', diff: 'b',

                tagline: 'Giving LLMs a memory they can look up — retrieve relevant context before generating answers.',
                concept: `<b>Retrieval-Augmented Generation (RAG)</b> solves a core LLM problem: models have a fixed knowledge cutoff and can hallucinate facts. RAG connects an LLM to an external knowledge base at query time.<br><br>
The pipeline has 2 phases: <b>Indexing</b> (offline: load → chunk → embed → store) and <b>Querying</b> (online: embed query → retrieve → augment prompt → generate). The LLM only generates; it doesn't need to memorize facts.`,

                keypoints: ['Components: Loader, Chunker, Embedder, VectorStore, Retriever, LLM', 'Indexing is offline (build once). Querying is online (real-time)', 'RAG does NOT update model weights — knowledge is in the vector store', 'Context window limit determines how much retrieved text fits in prompt'],
                examples: [

                        prob: 'Trace a user question through the full RAG pipeline.',

                        steps: [

                                desc: '📄 Step 1 — LOAD: Load raw documents (PDFs, docs, web pages) using a document loader. Each document becomes a string of text + metadata.',
                                viz: 'pipeline', nodes: ['Load Docs', '→', 'Chunk', '→', 'Embed', '→', 'VectorStore', '→', 'Retrieve', '→', 'Prompt', '→', 'LLM'], active: 0,
                                info: ['Source: company_policy.pdf', 'Loader: PyPDFLoader', 'Output: 42 pages of raw text']
                            },
                            {
                                desc: '✂️ Step 2 — CHUNK: Split documents into smaller pieces (chunks) that fit in the embedding model context. Overlap between chunks preserves context at boundaries.',
                                viz: 'pipeline', nodes: ['Load Docs', '→', 'Chunk', '→', 'Embed', '→', 'VectorStore', '→', 'Retrieve', '→', 'Prompt', '→', 'LLM'], active: 2,
                                info: ['chunk_size: 512 tokens', 'chunk_overlap: 50 tokens', '42 pages → 180 chunks']
                            },
                            {
                                desc: '🔢 Step 3 — EMBED: Convert each chunk to a dense vector using an embedding model. Similar text → similar vectors. Store (chunk, vector) pairs in a vector database.',
                                viz: 'pipeline', nodes: ['Load Docs', '→', 'Chunk', '→', 'Embed', '→', 'VectorStore', '→', 'Retrieve', '→', 'Prompt', '→', 'LLM'], active: 4,
                                info: ['Model: text-embedding-3-small', 'Dimensions: 1536', '180 chunks → 180 vectors stored']

                                viz: 'pipeline', nodes: ['Load Docs', '→', 'Chunk', '→', 'Embed', '→', 'VectorStore', '→', 'Retrieve', '→', 'Prompt', '→', 'LLM'], active: 6,

                                viz: 'pipeline', nodes: ['Load Docs', '→', 'Chunk', '→', 'Embed', '→', 'VectorStore', '→', 'Retrieve', '→', 'Prompt', '→', 'LLM'], active: 12,

                    },
                    {
                        title: 'RAG vs Fine-tuning — When to Use Which',
                        prob: 'Understand when RAG is better than fine-tuning.',

                                desc: '🔄 RAG: Knowledge lives in a vector store — update docs without touching the model. Perfect for frequently changing information.',
                                viz: 'scores', items: [{ label: 'Dynamic knowledge updates', val: 0.95, pct: 95 }, { label: 'Private/custom documents', val: 0.90, pct: 90 }, { label: 'Fact-grounding / citations', val: 0.92, pct: 92 }, { label: 'Specific writing style/tone', val: 0.30, pct: 30 }], title: 'RAG Strengths'
                            },
                            {
                                desc: '🎯 Fine-tuning: Bakes knowledge INTO model weights. Better for consistent tone, domain-specific reasoning style, or very short inputs with no retrieval budget.',
                                viz: 'scores', items: [{ label: 'Writing style/behavior', val: 0.95, pct: 95 }, { label: 'Domain reasoning patterns', val: 0.88, pct: 88 }, { label: 'Fast inference (no retrieval)', val: 0.80, pct: 80 }, { label: 'Real-time doc updates', val: 0.20, pct: 20 }], title: 'Fine-tuning Strengths'
                            },
                            {
                                desc: '✅ RAG wins when: docs change frequently, you need citations, private data, or you cannot afford retraining costs.',
                                viz: 'docs', items: [{ label: '✅ Use RAG', note: 'Company policy changes monthly', cls: 'done' }, { label: '✅ Use RAG', note: 'Legal documents with citations needed', cls: 'done' }, { label: '🎯 Fine-tune', note: 'Customer service tone consistency', cls: 'warn' }, { label: '⚡ Both!', note: 'Legal reasoning style + current case docs', cls: 'active' }]
                            },
                            {
                                desc: '🔥 Production reality: Combine both! Fine-tune the LLM for domain style, then use RAG to supply current facts. Best of both worlds.',
                                viz: 'docs', items: [{ label: 'Architecture: RAG + Fine-tune', note: 'Style from fine-tune + Facts from RAG = Best results', cls: 'done' }, { label: 'Cost comparison', note: 'RAG: cheap to update | Fine-tune: $$$ per run', cls: 'active' }, { label: 'Latency', note: 'RAG adds retrieval time (~100-500ms)', cls: 'warn' }]
                            },
                        ]
                    },
                    {
                        title: 'Context Window & Token Budget',
                        prob: 'How does the LLM context window constrain RAG design?',
                        input: 'GPT-4 context = 128K tokens. Query + chunks + answer must all fit.',
                        output: 'Token-aware chunk sizing and retrieval count strategy',
                        steps: [
                            {
                                desc: '📏 Token budget = total context window. Must allocate to: system prompt, retrieved chunks, user query, and room for the LLM response.',
                                viz: 'docs', items: [{ label: 'System Prompt', note: '~500 tokens (instructions, persona)', cls: 'warn' }, { label: 'Retrieved Chunks (K×chunk_size)', note: '3 × 512 = ~1536 tokens', cls: 'active' }, { label: 'User Query', note: '~50-200 tokens', cls: 'done' }, { label: 'Response Reserve', note: '~1000-2000 tokens for answer', cls: 'done' }]
                            },
                            {
                                desc: '⚖️ Trade-off: larger chunks → fewer can fit → less recall. Smaller chunks → more fit → but each has less context. chunk_size=512, K=5 is a safe default.',
                                viz: 'scores', items: [{ label: 'chunk_size=256, K=10 (more recall)', val: 0.75, pct: 75 }, { label: 'chunk_size=512, K=5 (balanced)', val: 0.90, pct: 90 }, { label: 'chunk_size=1024, K=3 (less recall)', val: 0.60, pct: 60 }], title: 'Retrieval Quality vs Token Budget'
                            },
                            {
                                desc: '🎯 For 128K context models (GPT-4, Claude 3): you can afford larger K or bigger chunks. For 4K models (GPT-3.5): be very conservative with your budget.',
                                viz: 'docs', items: [{ label: 'GPT-3.5 (4K)', note: 'K=2, chunk=256 — very tight', cls: 'warn' }, { label: 'GPT-4 (128K)', note: 'K=10, chunk=1024 — generous', cls: 'done' }, { label: 'Claude 3 (200K)', note: 'K=20+ — almost unlimited RAG', cls: 'done' }]
                            },
                            {
                                desc: '💡 Pro tip: Always reserve 20% of context for the response. Track token usage programmatically. Use tiktoken to count before sending.',
                                viz: 'docs', items: [{ label: 'Token counting', note: 'Use tiktoken.encoding_for_model()', cls: 'active' }, { label: 'Budget formula', note: 'max_chunks = (ctx_window × 0.7 - sys_prompt) / chunk_size', cls: 'done' }]
                            },
                        ]
                    }
                ],
                code: `<span class="kw">from</span> langchain.document_loaders <span class="kw">import</span> PyPDFLoader
<span class="kw">from</span> langchain.text_splitter <span class="kw">import</span> RecursiveCharacterTextSplitter
<span class="kw">from</span> langchain.embeddings <span class="kw">import</span> OpenAIEmbeddings
<span class="kw">from</span> langchain.vectorstores <span class="kw">import</span> Chroma
<span class="kw">from</span> langchain.chat_models <span class="kw">import</span> ChatOpenAI
<span class="kw">from</span> langchain.chains <span class="kw">import</span> RetrievalQA

<span class="cm"># ── INDEXING PHASE (offline) ──────────────────</span>
loader = <span class="cls">PyPDFLoader</span>(<span class="str">"company_policy.pdf"</span>)
documents = loader.<span class="fn">load</span>()                   <span class="cm"># list of Document objects</span>

splitter = <span class="cls">RecursiveCharacterTextSplitter</span>(
    chunk_size=<span class="num">512</span>,
    chunk_overlap=<span class="num">50</span>,                        <span class="cm"># overlap for boundary context</span>
)
chunks = splitter.<span class="fn">split_documents</span>(documents) <span class="cm"># 42 pages → 180 chunks</span>

embeddings = <span class="cls">OpenAIEmbeddings</span>()
vectorstore = Chroma.<span class="fn">from_documents</span>(chunks, embeddings)

<span class="cm"># ── QUERYING PHASE (online) ───────────────────</span>
retriever = vectorstore.<span class="fn">as_retriever</span>(search_kwargs={<span class="str">"k"</span>: <span class="num">3</span>})
llm = <span class="cls">ChatOpenAI</span>(model=<span class="str">"gpt-4o"</span>, temperature=<span class="num">0</span>)

chain = <span class="cls">RetrievalQA</span>.<span class="fn">from_chain_type</span>(llm=llm, retriever=retriever)
answer = chain.<span class="fn">invoke</span>(<span class="str">"What is our refund policy?"</span>)`,
                problems: [
                    { name: 'Build a PDF Q&A chatbot', diff: 'b' }, { name: 'Add metadata filtering to retrieval', diff: 'i' },
                    { name: 'Multi-document RAG with source tracking', diff: 'i' }, { name: 'RAG with streaming responses', diff: 'i' },
                    { name: 'Evaluate RAG with RAGAS', diff: 'a' }, { name: 'Productionize RAG with async retrieval', diff: 'a' },
                ]
            },

            /* ─── 02 CHUNKING ─── */
            {
                id: 'chunking', num: '02', title: 'Text Chunking',
                cat: 'Indexing', color: '#38bdf8', icon: '✂️', diff: 'i',
                tags: ['Chunking', 'Splitter', 'Overlap'],
                tagline: 'Split documents wisely — chunk size and strategy dramatically impact retrieval quality.',
                concept: `<b>Chunking</b> breaks documents into smaller pieces before embedding. The challenge: chunks must be small enough for the embedding model, but large enough to contain complete ideas. A poorly chunked document will produce poor retrievals regardless of how good your embedder is.<br><br>
<b>Strategies</b>: Fixed-size (simple), Recursive character (respects structure), Sentence-based (semantic boundaries), Semantic chunking (embed-then-split), and Agentic chunking (LLM decides boundaries).`,
                when: ['Default: use RecursiveCharacterTextSplitter', 'Code files: use Language-aware splitter', 'Well-structured docs: split by markdown headers', 'Best quality needed: semantic chunking'],
                keypoints: ['chunk_overlap preserves context at boundaries (typically 10-15% of chunk_size)', 'chunk_size=512 tokens is a good starting default', 'Test your chunker: print 5 random chunks and read them — do they make sense alone?', 'Metadata (source, page, section) should be attached to each chunk'],
                examples: [
                    {
                        title: 'Fixed vs Recursive Chunking',
                        prob: 'Compare fixed-size splitting vs recursive splitting on a structured document.',
                        input: '"# Introduction\\nRAG is great.\\n\\n# Details\\nChunking matters..." (markdown doc)',
                        output: 'Recursive splitting respects section boundaries better',
                        steps: [
                            {
                                desc: '📄 Input document has natural structure: headers, paragraphs, sentences. Fixed-size splitting blindly cuts at character count, often mid-sentence.',
                                viz: 'chunks', chunks: [{ text: '# Intro\nRAG is great for building QA sy', cls: 'bad' }, { text: 'stems over large doc collections.\n# Det', cls: 'bad' }, { text: 'ails\nChunking matters because...', cls: 'bad' }], note: 'Fixed-size: cuts mid-sentence ❌'
                            },
                            {
                                desc: '🔄 Recursive splitter tries \\n\\n (paragraphs) first, then \\n (lines), then spaces. Respects natural document structure.',
                                viz: 'chunks', chunks: [{ text: '# Introduction\nRAG is great for building QA systems.', cls: 'active' }, { text: '# Details\nChunking matters because embedding quality depends on context.', cls: 'active' }], note: 'Recursive: respects paragraphs ✓'
                            },
                            {
                                desc: '🔗 Overlap: chunk_overlap=50 means last 50 chars of chunk N appear at start of chunk N+1. Prevents losing context at boundaries.',
                                viz: 'chunks', chunks: [{ text: '...embedding quality depends on context boundary.', cls: 'active' }, { text: 'context boundary. The best chunk size...', cls: 'overlap' }, { text: 'The best chunk size depends on your embedding model.', cls: 'active' }], note: 'Overlap preserves boundary context ✓'
                            },
                            {
                                desc: '📊 Rule of thumb: chunk_size=512 works for most embedding models. For sentence-transformers (max 256-512 tokens), stay under that limit.',
                                viz: 'docs', items: [{ label: 'chunk_size=128', note: 'Very granular, lots of chunks, low coherence', cls: 'warn' }, { label: 'chunk_size=512', note: 'Good balance — recommended default', cls: 'done' }, { label: 'chunk_size=2048', note: 'Large context, fewer chunks, may dilute retrieval', cls: 'warn' }]
                            },
                        ]
                    },
                    {
                        title: 'Semantic Chunking',
                        prob: 'Split document based on semantic shifts, not character count.',
                        input: 'Long document with topic transitions',
                        output: 'Chunks that each contain one coherent topic',
                        steps: [
                            {
                                desc: '🧠 Semantic chunking: embed every sentence, then find points where cosine similarity DROPS sharply between adjacent sentences. That drop = topic boundary.',
                                viz: 'scores', items: [{ label: 'Sent 1-2: RAG introduction', val: 0.94, pct: 94 }, { label: 'Sent 2-3: still RAG (same topic)', val: 0.91, pct: 91 }, { label: 'Sent 3-4: ⬇️ topic shift to databases', val: 0.41, pct: 41 }, { label: 'Sent 4-5: databases (same topic)', val: 0.88, pct: 88 }], title: 'Sentence-to-Sentence Similarity'
                            },
                            {
                                desc: '✂️ Split at similarity drops below threshold (e.g., 0.5). Sentences 1-3 become chunk 1, sentences 4+ become chunk 2.',
                                viz: 'chunks', chunks: [{ text: 'Chunk 1: RAG intro sentences 1-3 (topic: RAG basics)', cls: 'done' }, { text: '[SPLIT POINT — similarity dropped to 0.41]', cls: 'bad' }, { text: 'Chunk 2: Database sentences 4-N (topic: vector DBs)', cls: 'done' }], note: 'Semantic split at topic boundary ✓'
                            },
                            {
                                desc: '⚖️ Tradeoff: semantic chunking gives better retrieval quality but is ~10x slower to index (requires embedding every sentence). Use for high-value, slower-changing docs.',
                                viz: 'scores', items: [{ label: 'Fixed chunking: index speed', val: 0.95, pct: 95 }, { label: 'Semantic chunking: index speed', val: 0.20, pct: 20 }, { label: 'Fixed chunking: retrieval quality', val: 0.65, pct: 65 }, { label: 'Semantic chunking: retrieval quality', val: 0.88, pct: 88 }], title: 'Speed vs Quality Tradeoff'
                            },
                            {
                                desc: '💡 LangChain\'s SemanticChunker automatically computes breakpoints. The breakpoint_threshold_type can be "percentile", "standard_deviation", or "interquartile".',
                                viz: 'docs', items: [{ label: 'SemanticChunker(embeddings)', note: 'Auto-detects topic boundaries using embedding similarity', cls: 'active' }, { label: 'breakpoint_threshold_type', note: '"percentile" (default) | "std_dev" | "gradient"', cls: 'done' }]
                            },
                        ]
                    },
                    {
                        title: 'Metadata-Aware Chunking',
                        prob: 'Attach rich metadata to each chunk for better filtering and attribution.',
                        input: '100-page legal document with sections, dates, clause numbers',
                        output: 'Chunks with metadata: source, page, section, clause_id',
                        steps: [
                            {
                                desc: '📋 Every chunk should carry metadata: where it came from (file, page, URL), what section it belongs to, and any domain-specific tags.',
                                viz: 'docs', items: [{ label: 'Chunk: "Termination clause 12.3..."', note: 'metadata={source:"contract.pdf", page:34, section:"Termination", clause:"12.3"}', cls: 'active' }, { label: 'Chunk: "Payment terms 5.1..."', note: 'metadata={source:"contract.pdf", page:12, section:"Payment", clause:"5.1"}', cls: 'done' }]
                            },
                            {
                                desc: '🔍 Metadata enables filtered retrieval: "retrieve only from Section 5" or "only from docs after 2024". Without metadata, you retrieve from everything.',
                                viz: 'scores', items: [{ label: 'No filter: all 500 chunks searched', val: 0.60, pct: 60 }, { label: 'With section filter: 30 chunks', val: 0.90, pct: 90 }, { label: 'With date+section filter: 8 chunks', val: 0.95, pct: 95 }], title: 'Retrieval Precision with Metadata Filters'
                            },
                            {
                                desc: '🏷️ Use ParentDocumentRetriever: store small child chunks for retrieval, but return the full parent document as context. Best of both worlds!',
                                viz: 'docs', items: [{ label: 'Index: small chunks (128 tokens)', note: 'Fine-grained retrieval accuracy', cls: 'done' }, { label: 'Retrieve: full parent doc returned', note: 'Full context for LLM answer generation', cls: 'active' }, { label: 'Result', note: 'Precise retrieval + rich context', cls: 'done' }]
                            },
                            {
                                desc: '✅ Always test metadata filtering. Print retrieved chunks with their metadata. Verify source attribution in responses points to correct documents.',
                                viz: 'docs', items: [{ label: 'Answer: "Per Section 12.3 of contract.pdf (page 34)..."', note: 'Clear attribution from metadata ✓', cls: 'done' }]
                            },
                        ]
                    }
                ],
                code: `<span class="kw">from</span> langchain.text_splitter <span class="kw">import</span> (
    RecursiveCharacterTextSplitter,
    MarkdownHeaderTextSplitter,
)
<span class="kw">from</span> langchain_experimental.text_splitter <span class="kw">import</span> SemanticChunker
<span class="kw">from</span> langchain.embeddings <span class="kw">import</span> OpenAIEmbeddings

<span class="cm"># ── 1. Recursive (recommended default) ───────</span>
splitter = <span class="cls">RecursiveCharacterTextSplitter</span>(
    chunk_size=<span class="num">512</span>,
    chunk_overlap=<span class="num">50</span>,
    separators=[<span class="str">"\n\n"</span>, <span class="str">"\n"</span>, <span class="str">" "</span>, <span class="str">""</span>],  <span class="cm"># priority order</span>
)
chunks = splitter.<span class="fn">split_documents</span>(docs)

<span class="cm"># ── 2. Markdown-aware (split on headers) ─────</span>
headers = [(<span class="str">"#"</span>, <span class="str">"H1"</span>), (<span class="str">"##"</span>, <span class="str">"H2"</span>), (<span class="str">"###"</span>, <span class="str">"H3"</span>)]
md_splitter = <span class="cls">MarkdownHeaderTextSplitter</span>(headers_to_split_on=headers)
md_chunks = md_splitter.<span class="fn">split_text</span>(markdown_text)
<span class="cm"># → each chunk has metadata["H1"], metadata["H2"]</span>

<span class="cm"># ── 3. Semantic chunking ─────────────────────</span>
semantic_splitter = <span class="cls">SemanticChunker</span>(
    <span class="cls">OpenAIEmbeddings</span>(),
    breakpoint_threshold_type=<span class="str">"percentile"</span>,
    breakpoint_threshold_amount=<span class="num">90</span>,  <span class="cm"># top 10% drops = boundary</span>

            <span class="kw">yield</span> chunk.content                  <span class="cm"># stream tokens</span>
    <span class="kw">return</span> <span class="cls">StreamingResponse</span>(<span class="fn">generate</span>(), media_type=<span class="str">"text/event-stream"</span>)

<span class="cm"># ── LangSmith tracing (automatic) ────────────</span>
<span class="kw">import</span> os
os.environ[<span class="str">"LANGCHAIN_TRACING_V2"</span>] = <span class="str">"true"</span>
os.environ[<span class="str">"LANGCHAIN_API_KEY"</span>] = <span class="str">"your-langsmith-key"</span>
<span class="cm"># All LangChain calls are now automatically traced!</span>

<span class="cm"># ── Semantic cache with GPTCache ──────────────</span>
<span class="kw">from</span> gptcache <span class="kw">import</span> cache
<span class="kw">from</span> gptcache.adapter <span class="kw">import</span> openai
cache.<span class="fn">init</span>(similarity_threshold=<span class="num">0.95</span>)
<span class="cm"># Now openai.ChatCompletion calls check cache first!</span>`,
                problems: [
                    { name: 'Add LangSmith tracing to RAG pipeline', diff: 'b' }, { name: 'Build streaming RAG with FastAPI', diff: 'i' },
                    { name: 'Implement semantic cache with GPTCache', diff: 'i' }, { name: 'Production RAG with monitoring + alerts', diff: 'a' },
                ]
            },

        ]; // end PATTERNS

        /* ════════════════════════════════
           HOME RENDER
        ════════════════════════════════ */
        const CAT_ORDER = ['Foundations', 'Indexing', 'Retrieval', 'Advanced RAG', 'Generation', 'Evaluation', 'Production'];

        function renderHome() {
            const container = document.getElementById('cards-container');
            const catMap = {};
            PATTERNS.forEach(p => { if (!catMap[p.cat]) catMap[p.cat] = []; catMap[p.cat].push(p); });
            let html = '';
            CAT_ORDER.forEach(cat => {
                if (!catMap[cat]) return;
                html += `<div class="cat-section"><div class="cat-label">${cat}</div><div class="patterns-grid">`;
                catMap[cat].forEach((p, i) => {
                    html += `<div class="pat-card" style="--c:${p.color};animation-delay:${i * 0.08}s" onclick="openLesson('${p.id}')">
        <div class="pat-card-top"><span class="pat-num">${p.num}</span><span class="pat-difficulty diff-${p.diff}">${{ b: 'Beginner', i: 'Intermediate', a: 'Advanced' }[p.diff]}</span></div>
        <div class="pat-icon">${p.icon}</div>
        <h3>${p.title}</h3><p>${p.tagline}</p>
        <div class="pat-card-footer">${p.tags.map(t => `<span class="pat-tag">${t}</span>`).join('')}</div>
        <span class="pat-arrow">→</span>
      </div>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }

        /* ════════════════════════════════
           LESSON RENDER
        ════════════════════════════════ */
        let currentIdx = 0;
        const stepState = {};

        function openLesson(id) {
            const idx = PATTERNS.findIndex(p => p.id === id);
            currentIdx = idx;
            renderLesson(PATTERNS[idx]);
            document.getElementById('lesson').classList.add('show');
            document.getElementById('lesson').scrollTop = 0;
            updateNavBtns();
        }

        function goHome() { document.getElementById('lesson').classList.remove('show'); }

        function navigate(dir) {
            const ni = currentIdx + dir;
            if (ni < 0 || ni >= PATTERNS.length) return;
            currentIdx = ni;
            renderLesson(PATTERNS[currentIdx]);
            document.getElementById('lesson').scrollTop = 0;
            updateNavBtns();
        }

        function updateNavBtns() {
            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').disabled = currentIdx === PATTERNS.length - 1;
        }

        function renderLesson(p) {
            document.getElementById('lesson-breadcrumb-text').textContent = p.title;
            document.querySelector('.progress-bar').style.cssText = `--c:${p.color};width:${((currentIdx + 1) / PATTERNS.length * 100)}%`;

            const cx = p.time ? `
    <div class="complexity-row" style="--c:${p.color}">
      <div class="cx"><div class="cx-label">Approach</div><div class="cx-val">${p.time}</div></div>
      <div class="cx-divider"></div>
      <div class="cx"><div class="cx-label">Category</div><div class="cx-val">${p.cat}</div></div>
    </div>` : '';

            let html = `
  <div class="lesson-header">
    <div class="lesson-cat-badge" style="--c:${p.color}">${p.cat}</div>
    <div class="lesson-title"><span class="num">${p.num}</span>${p.title}</div>
    <div class="lesson-tagline">${p.tagline}</div>
  </div>
  ${cx}
  <div class="concept-block" style="--c:${p.color}">
    <div class="section-header" style="--c:${p.color}"><span class="section-num" style="background:${p.color}">concept</span><h2>What is it?</h2></div>
    <div class="concept-text">${p.concept}</div>
    <div class="when-grid">${p.when.map(w => `<div class="when-item"><div class="when-dot" style="background:${p.color}"></div>${w}</div>`).join('')}</div>
  </div>

  <div class="examples-section">
    <div class="section-header" style="--c:${p.color}"><span class="section-num" style="background:${p.color}">examples</span><h2>Step-by-Step Walkthroughs</h2></div>
    <div class="example-tabs">
      ${p.examples.map((ex, i) => `<button class="ex-tab ${i === 0 ? 'active' : ''}" style="${i === 0 ? `--c:${p.color}` : ''}" onclick="switchEx(this,'${p.id}',${i},'${p.color}')">${p.examples.length > 1 ? `Ex ${i + 1}: ` : ''}${ex.title}</button>`).join('')}
    </div>
    ${p.examples.map((ex, i) => `
      <div class="example-panel ${i === 0 ? 'active' : ''}" id="exp_${p.id}_${i}">
        <div class="ex-problem" style="--c:${p.color}">
          <div class="q-label">Scenario</div>
          <div class="q-text">${ex.prob}</div>
          <div class="q-io">Input: ${ex.input}</div>
        </div>
        <div class="stepper" id="stepper_${p.id}_${i}" style="--c:${p.color}">
          <div class="stepper-header">
            <div class="stepper-title">Walkthrough</div>
            <div class="stepper-counter">Step <span class="step-counter-num" id="sc_${p.id}_${i}">1</span> / ${ex.steps.length}</div>
          </div>
          <div class="stepper-viz" id="viz_${p.id}_${i}"></div>
          <div class="stepper-desc" id="desc_${p.id}_${i}"></div>
          <div class="stepper-controls">
            <button class="step-btn" id="prev_${p.id}_${i}" onclick="stepEx('${p.id}',${i},-1,'${p.color}')" style="--c:${p.color}">← Prev</button>
            <button class="step-btn" id="next_${p.id}_${i}" onclick="stepEx('${p.id}',${i},1,'${p.color}')" style="--c:${p.color}">Next →</button>
            <div class="step-dots">${ex.steps.map((_, si) => `<div class="step-dot ${si === 0 ? 'active' : ''}" id="dot_${p.id}_${i}_${si}" style="--c:${p.color}"></div>`).join('')}</div>
          </div>
        </div>
        <div class="result-box"><span class="result-label">Outcome</span><span class="result-val">${ex.output}</span></div>
      </div>`).join('')}
  </div>

  <div class="code-section">
    <div class="section-header" style="--c:${p.color}"><span class="section-num" style="background:${p.color}">code</span><h2>Python Implementation</h2></div>
    <div class="code-box">
      <div class="code-header"><span class="code-lang">Python · LangChain</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
      <pre>${p.code}</pre>
    </div>
  </div>

  <div class="problems-section">
    <div class="section-header" style="--c:${p.color}"><span class="section-num" style="background:${p.color}">practice</span><h2>Build & Explore</h2></div>
    <div class="prob-grid">${p.problems.map(prob => `
      <div class="prob-item"><span class="prob-diff ${prob.diff}">${{ b: 'Beginner', i: 'Intermediate', a: 'Advanced' }[prob.diff][0]}</span>${prob.name}</div>`).join('')}
    </div>
  </div>`;

            document.getElementById('lesson-content').innerHTML = html;
            p.examples.forEach((_, i) => { stepState[`${p.id}_${i}`] = 0; renderStep(p.id, i, p.examples[i], 0, p.color); });
        }

        /* ════════════════════════════════
           STEP RENDER
        ════════════════════════════════ */
        function renderStep(pid, eidx, ex, si, color) {
            const step = ex.steps[si];
            const key = `${pid}_${eidx}`;

            // VIZ
            const vizEl = document.getElementById(`viz_${pid}_${eidx}`);
            if (vizEl) {
                let v = '';
                if (step.viz === 'pipeline') {
                    v = `<div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;">RAG Pipeline</div>
        <div class="pipeline">
          ${step.nodes.map((n, ni) => `<div class="${n === '→' ? 'pipe-arrow' : 'pipe-node' + (ni === step.active * 2 ? ' active' : '')}">${n}</div>`).join('')}
        </div>`;
                    if (step.info) v += `<div class="info-row">${step.info.map(i => `<div class="info-badge">${i}</div>`).join('')}</div>`;
                } else if (step.viz === 'docs') {
                    v = `<div class="doc-viz">${(step.items || []).map(item => `<div class="doc-block ${item.cls || ''}">${item.label}${item.note ? `<span style="color:var(--muted2);font-size:10px;display:block;margin-top:3px">${item.note}</span>` : ''}</div>`).join('')}</div>`;
                } else if (step.viz === 'scores') {
                    v = `<div style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:10px">${step.title || 'Scores'}</div>
        <div class="score-row">${(step.items || []).map((item, ii) => `<div class="score-item ${ii === 0 ? 'top' : ''}">
          <div class="score-label">${item.label}</div>
          <div style="flex:1;background:var(--border);border-radius:4px;height:8px;overflow:hidden"><div class="score-bar" style="width:${item.pct}%;background:${color}"></div></div>
          <div class="score-val">${item.val}</div>
        </div>`).join('')}</div>`;
                } else if (step.viz === 'chunks') {
                    v = `<div class="chunk-row">${(step.chunks || []).map(c => `<div class="chunk ${c.cls || ''}">${c.text}</div>`).join('')}</div>
        ${step.note ? `<div style="font-family:var(--mono);font-size:10px;color:${color};margin-top:10px">${step.note}</div>` : ''}`;
                } else if (step.viz === 'embed') {
                    const COLORS = ['#818cf8', '#38bdf8', '#34d399', '#f59e0b', '#fb7185', '#a78bfa', '#6ee7b7', '#fbbf24'];
                    v = `<div style="margin-bottom:10px">${(step.words || []).map((w, wi) => `<div style="margin-bottom:8px">
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted2);margin-bottom:4px">${w}</div>
        <div class="embed-row">${(step.vecs && step.vecs[wi] ? step.vecs[wi] : []).map((val, di) => {
                        const v = Math.round((val + 1) / 2 * 255); const bg = `rgba(${COLORS[di % 8].slice(1).match(/../g).map(h => parseInt(h, 16)).join(',')},${Math.abs(val) * 0.8 + 0.1})`;
                        return `<div class="embed-cell" style="background:${bg};color:${val > 0 ? '#fff' : '#000'}">${val.toFixed(1)}</div>`;
                    }).join('')}<span style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:8px">...1536 dims</span></div>
      </div>`).join('')}
      ${step.note ? `<div style="font-family:var(--mono);font-size:10px;color:${color};margin-top:4px">${step.note}</div>` : ''}`;
                }
                vizEl.innerHTML = v;
            }

            document.getElementById(`desc_${pid}_${eidx}`).innerHTML = step.desc;
            document.getElementById(`sc_${pid}_${eidx}`).textContent = si + 1;
            ex.steps.forEach((_, s) => {
                const d = document.getElementById(`dot_${pid}_${eidx}_${s}`);
                if (d) d.classList.toggle('active', s === si);
            });
            const p = document.getElementById(`prev_${pid}_${eidx}`);
            const n = document.getElementById(`next_${pid}_${eidx}`);
            if (p) p.disabled = si === 0;
            if (n) n.disabled = si === ex.steps.length - 1;
        }

        function stepEx(pid, eidx, dir, color) {
            const key = `${pid}_${eidx}`;
            const p = PATTERNS.find(x => x.id === pid);
            const ex = p.examples[eidx];
            const ns = Math.max(0, Math.min(ex.steps.length - 1, (stepState[key] || 0) + dir));
            stepState[key] = ns;
            renderStep(pid, eidx, ex, ns, color);
        }

        function switchEx(btn, pid, idx, color) {
            btn.closest('.examples-section').querySelectorAll('.ex-tab').forEach(t => { t.classList.remove('active'); t.style.removeProperty('--c'); });
            btn.classList.add('active'); btn.style.setProperty('--c', color);
            btn.closest('.examples-section').querySelectorAll('.example-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
        }

        function copyCode(btn) {
            navigator.clipboard.writeText(btn.closest('.code-box').querySelector('pre').innerText).then(() => {
                btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1500);
            });
        }

        document.getElementById('lesson').addEventListener('scroll', function () {
            const pct = this.scrollTop / (this.scrollHeight - this.clientHeight) * 100;
            document.querySelector('.progress-bar').style.width = pct + '%';
        });

        renderHome();
    </script>
    <script defer src="../assets/learnsite.js"></script>
</body>

</html>
