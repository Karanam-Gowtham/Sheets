<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSA Patterns — Learn by Doing</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Clash+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #080b12;
            --surface: #0d1117;
            --card: #111827;
            --border: #1f2937;
            --border2: #374151;
            --text: #f1f5f9;
            --muted: #6b7280;
            --muted2: #9ca3af;
            --mono: 'Space Mono', monospace;
            --display: 'Clash Display', 'DM Sans', sans-serif;
            --body: 'DM Sans', sans-serif;
            --accent: #00e5ff;
            --radius: 12px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── GRID BG ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ══════════════════════════════
   HOME SCREEN
══════════════════════════════ */
        #home {
            position: relative;
            z-index: 1;
            padding: 48px 24px 80px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .home-hero {
            text-align: center;
            margin-bottom: 60px;
            padding-top: 20px;
        }

        .home-hero .eyebrow {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.1s forwards;
        }

        .home-hero h1 {
            font-family: var(--display);
            font-size: clamp(36px, 6vw, 72px);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.2s forwards;
        }

        .home-hero h1 .gradient {
            background: linear-gradient(135deg, #00e5ff 0%, #a78bfa 50%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .home-hero p {
            font-size: 16px;
            color: var(--muted2);
            max-width: 520px;
            margin: 0 auto 32px;
            line-height: 1.7;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.3s forwards;
        }

        .stats-row {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.4s forwards;
        }

        .stat-pill {
            font-family: var(--mono);
            font-size: 11px;
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: var(--muted2);
        }

        .stat-pill span {
            color: var(--accent);
            font-weight: 700;
        }

        /* CATEGORY SECTION */
        .cat-label {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 16px;
            padding-left: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cat-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .cat-section {
            margin-bottom: 40px;
        }

        /* PATTERN CARDS GRID */
        .patterns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .pat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
        }

        .pat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--c, #00e5ff);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .pat-card:hover {
            border-color: var(--border2);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .pat-card:hover::before {
            transform: scaleX(1);
        }

        .pat-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .pat-num {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
        }

        .pat-difficulty {
            font-family: var(--mono);
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
        }

        .diff-e {
            background: rgba(16, 185, 129, 0.12);
            color: #10b981;
        }

        .diff-m {
            background: rgba(245, 158, 11, 0.12);
            color: #f59e0b;
        }

        .diff-h {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
        }

        .pat-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .pat-card h3 {
            font-family: var(--display);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .pat-card p {
            font-size: 12px;
            color: var(--muted2);
            line-height: 1.6;
        }

        .pat-card-footer {
            display: flex;
            gap: 6px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .pat-tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted2);
            font-family: var(--mono);
        }

        .pat-arrow {
            position: absolute;
            bottom: 18px;
            right: 18px;
            font-size: 18px;
            color: var(--muted);
            opacity: 0;
            transition: opacity 0.2s, color 0.2s;
        }

        .pat-card:hover .pat-arrow {
            opacity: 1;
            color: var(--c, #00e5ff);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ══════════════════════════════
   LESSON SCREEN
══════════════════════════════ */
        #lesson {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            overflow-y: auto;
        }

        #lesson.show {
            display: block;
        }

        /* TOP BAR */
        .lesson-topbar {
            position: sticky;
            top: 0;
            background: rgba(8, 11, 18, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted2);
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            font-family: var(--body);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }

        .back-btn:hover {
            border-color: var(--border2);
            color: var(--text);
        }

        .lesson-breadcrumb {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .lesson-breadcrumb .current {
            color: var(--accent);
        }

        .lesson-nav {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .nav-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted2);
            padding: 6px 14px;
            cursor: pointer;
            font-size: 12px;
            font-family: var(--body);
            transition: all 0.15s;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--border2);
            color: var(--text);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* LESSON BODY */
        .lesson-body {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* LESSON HEADER */
        .lesson-header {
            margin-bottom: 36px;
        }

        .lesson-cat-badge {
            font-family: var(--mono);
            font-size: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--c, #00e5ff);
            color: var(--c, #00e5ff);
            background: rgba(0, 229, 255, 0.06);
            display: inline-block;
            margin-bottom: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .lesson-title {
            font-family: var(--display);
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .lesson-title .num {
            color: var(--c, #00e5ff);
            opacity: 0.4;
            margin-right: 8px;
        }

        .lesson-tagline {
            font-size: 15px;
            color: var(--muted2);
            line-height: 1.7;
            max-width: 600px;
        }

        /* COMPLEXITY BAR */
        .complexity-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            padding: 16px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 28px;
        }

        .cx {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .cx-label {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cx-val {
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 700;
            color: var(--c, #00e5ff);
        }

        .cx-divider {
            width: 1px;
            background: var(--border);
            margin: 0 4px;
        }

        /* CONCEPT SECTION */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .section-header h2 {
            font-family: var(--display);
            font-size: 18px;
            font-weight: 600;
        }

        .section-num {
            font-family: var(--mono);
            font-size: 10px;
            background: var(--c, #00e5ff);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .concept-block {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 28px;
        }

        .concept-text {
            font-size: 14px;
            color: var(--muted2);
            line-height: 1.9;
            margin-bottom: 16px;
        }

        .when-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        @media (max-width: 600px) {
            .when-grid {
                grid-template-columns: 1fr;
            }
        }

        .when-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
            color: var(--muted2);
        }

        .when-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--c, #00e5ff);
            flex-shrink: 0;
            margin-top: 4px;
        }

        /* DIAGRAM */
        .diagram-section {
            margin-bottom: 28px;
        }

        .diagram-container {
            background: #0a0d14;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            overflow-x: auto;
            position: relative;
        }

        .diagram-title {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
        }

        /* EXAMPLES */
        .examples-section {
            margin-bottom: 28px;
        }

        .example-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .ex-tab {
            font-family: var(--mono);
            font-size: 11px;
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .ex-tab.active {
            border-color: var(--c, #00e5ff);
            color: var(--c, #00e5ff);
            background: rgba(0, 229, 255, 0.06);
        }

        .example-panel {
            display: none;
        }

        .example-panel.active {
            display: block;
        }

        .ex-problem {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--c, #00e5ff);
            border-radius: 0 8px 8px 0;
            padding: 14px 16px;
            margin-bottom: 20px;
        }

        .ex-problem .q-label {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--c, #00e5ff);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .ex-problem .q-text {
            font-size: 13px;
            color: var(--text);
            line-height: 1.6;
        }

        .ex-problem .q-io {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted2);
            margin-top: 8px;
        }

        /* STEP STEPPER */
        .stepper {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .stepper-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stepper-title {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stepper-counter {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
        }

        .step-counter-num {
            color: var(--c, #00e5ff);
            font-weight: 700;
        }

        .stepper-viz {
            padding: 20px 18px;
            min-height: 100px;
        }

        .stepper-desc {
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--muted2);
            line-height: 1.6;
        }

        .stepper-controls {
            padding: 12px 18px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .step-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 7px 18px;
            cursor: pointer;
            font-size: 12px;
            font-family: var(--body);
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .step-btn:hover:not(:disabled) {
            border-color: var(--c, #00e5ff);
            color: var(--c, #00e5ff);
        }

        .step-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .step-dots {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: background 0.2s;
        }

        .step-dot.active {
            background: var(--c, #00e5ff);
        }

        /* ARRAY VIZ */
        .arr-viz {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .arr-cell {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: 16px;
            font-weight: 700;
            border: 2px solid var(--border);
            background: var(--surface);
            color: var(--muted2);
            transition: all 0.3s ease;
            position: relative;
        }

        .arr-cell.active {
            border-color: var(--c, #00e5ff);
            background: rgba(0, 229, 255, 0.12);
            color: var(--c, #00e5ff);
            transform: translateY(-4px);
        }

        .arr-cell.window {
            border-color: rgba(0, 229, 255, 0.4);
            background: rgba(0, 229, 255, 0.06);
            color: var(--text);
        }

        .arr-cell.found {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            transform: translateY(-4px);
        }

        .arr-cell.removed {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
            color: #ef4444;
        }

        .arr-cell.pivot {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.12);
            color: #f59e0b;
            transform: scale(1.08);
        }

        .arr-label {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            font-family: var(--mono);
            color: var(--c, #00e5ff);
            white-space: nowrap;
        }

        /* RESULT BOX */
        .result-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 8px;
            margin-top: 12px;
        }

        .result-label {
            font-family: var(--mono);
            font-size: 10px;
            color: #10b981;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-val {
            font-family: var(--mono);
            font-size: 15px;
            font-weight: 700;
            color: #10b981;
        }

        /* CODE BLOCK */
        .code-section {
            margin-bottom: 28px;
        }

        .code-box {
            background: #070a0f;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .code-lang {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .copy-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            font-size: 11px;
            padding: 3px 10px;
            cursor: pointer;
            font-family: var(--mono);
            transition: all 0.15s;
        }

        .copy-btn:hover {
            border-color: var(--border2);
            color: var(--text);
        }

        pre {
            font-family: var(--mono);
            font-size: 12px;
            padding: 18px;
            overflow-x: auto;
            line-height: 1.8;
            color: #cdd6f4;
        }

        .kw {
            color: #cba6f7;
        }

        .fn {
            color: #89b4fa;
        }

        .cm {
            color: #45475a;
            font-style: italic;
        }

        .num {
            color: #fab387;
        }

        .str {
            color: #a6e3a1;
        }

        .type {
            color: #94e2d5;
        }

        /* PROBLEMS */
        .problems-section {
            margin-bottom: 28px;
        }

        .prob-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .prob-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            font-size: 12px;
            color: var(--muted2);
            transition: border-color 0.15s;
        }

        .prob-item:hover {
            border-color: var(--border2);
        }

        .prob-diff {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 700;
        }

        .prob-diff.e {
            color: #10b981;
        }

        .prob-diff.m {
            color: #f59e0b;
        }

        .prob-diff.h {
            color: #ef4444;
        }

        /* TREE VIZ */
        .tree-viz svg {
            display: block;
            margin: 0 auto;
        }

        /* PROGRESS BAR */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: var(--c, #00e5ff);
            transition: width 0.3s ease;
            z-index: 999;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .lesson-body {
                padding: 24px 16px 60px;
            }

            .arr-cell {
                width: 36px;
                height: 36px;
                font-size: 13px;
            }

            .complexity-row {

<span class="kw">int</span> <span class="fn">maxSumFixed</span>(<span class="kw">int</span>[] arr, <span class="kw">int</span> k) {
    <span class="kw">int</span> sum = <span class="num">0</span>, max = <span class="num">0</span>;
    <span class="kw">for</span> (<span class="kw">int</span> i = <span class="num">0</span>; i < k; i++) sum += arr[i]; <span class="cm">// first window</span>
    max = sum;
    <span class="kw">for</span> (<span class="kw">int</span> i = k; i < arr.length; i++) {
        sum += arr[i] - arr[i - k]; <span class="cm">// slide: add right, remove left</span>
        max = Math.<span class="fn">max</span>(max, sum);
    }
    <span class="kw">return</span> max;
}

<span class="cm">// Variable Window — Longest Substring ≤ K Distinct Chars</span>
<span class="kw">int</span> <span class="fn">longestKDistinct</span>(String s, <span class="kw">int</span> k) {
    Map&lt;Character, Integer&gt; freq = <span class="kw">new</span> HashMap&lt;&gt;();
    <span class="kw">int</span> l = <span class="num">0</span>, max = <span class="num">0</span>;
    <span class="kw">for</span> (<span class="kw">int</span> r = <span class="num">0</span>; r < s.length(); r++) {
        freq.<span class="fn">merge</span>(s.<span class="fn">charAt</span>(r), <span class="num">1</span>, Integer::sum); <span class="cm">// expand</span>
        <span class="kw">while</span> (freq.<span class="fn">size</span>() > k) {                    <span class="cm">// shrink</span>
            <span class="kw">char</span> c = s.<span class="fn">charAt</span>(l++);
            freq.<span class="fn">merge</span>(c, -<span class="num">1</span>, Integer::sum);
            <span class="kw">if</span> (freq.<span class="fn">get</span>(c) == <span class="num">0</span>) freq.<span class="fn">remove</span>(c);
        }
        max = Math.<span class="fn">max</span>(max, r - l + <span class="num">1</span>);
    }
    <span class="kw">return</span> max;
}`,

<span class="cm">// 3Sum</span>

                res.<span class="fn">add</span>(List.<span class="fn">of</span>(nums[i], nums[l++], nums[r--]));

<span class="cm">// Range query O(1)</span>
<span class="kw">int</span> <span class="fn">rangeSum</span>(<span class="kw">int</span> l, <span class="kw">int</span> r) {
    <span class="kw">return</span> prefix[r + <span class="num">1</span>] - prefix[l];
}

<span class="cm">// Count Subarrays with Sum = K</span>
<span class="kw">int</span> <span class="fn">subarraySum</span>(<span class="kw">int</span>[] nums, <span class="kw">int</span> k) {
    Map&lt;Integer, Integer&gt; map = <span class="kw">new</span> HashMap&lt;&gt;();
    map.<span class="fn">put</span>(<span class="num">0</span>, <span class="num">1</span>);       <span class="cm">// empty prefix</span>
    <span class="kw">int</span> sum = <span class="num">0</span>, count = <span class="num">0</span>;
    <span class="kw">for</span> (<span class="kw">int</span> n : nums) {
        sum += n;
        count += map.<span class="fn">getOrDefault</span>(sum - k, <span class="num">0</span>);
        map.<span class="fn">merge</span>(sum, <span class="num">1</span>, Integer::sum);
    }
    <span class="kw">return</span> count;
}`,

<span class="kw">boolean</span> <span class="fn">hasCycle</span>(ListNode head) {
    ListNode slow = head, fast = head;
    <span class="kw">while</span> (fast != <span class="kw">null</span> && fast.next != <span class="kw">null</span>) {

        fast = fast.next.next;
        <span class="kw">if</span> (slow == fast) <span class="kw">return true</span>;
    }
    <span class="kw">return false</span>;
}

<span class="cm">// Find Cycle Start (Floyd's)</span>
ListNode <span class="fn">detectCycleStart</span>(ListNode head) {
    ListNode slow = head, fast = head;
    <span class="kw">while</span> (fast != <span class="kw">null</span> && fast.next != <span class="kw">null</span>) {
        slow = slow.next;
        fast = fast.next.next;
        <span class="kw">if</span> (slow == fast) {
            slow = head;                         <span class="cm">// reset slow</span>
            <span class="kw">while</span> (slow != fast) {
                slow = slow.next;
                fast = fast.next;               <span class="cm">// both speed 1</span>
            }
            <span class="kw">return</span> slow;                       <span class="cm">// cycle start</span>
        }
    }
    <span class="kw">return null</span>;
}

        fast = fast.next.next;
    }

}`,

<span class="kw">int</span> <span class="fn">binarySearch</span>(<span class="kw">int</span>[] arr, <span class="kw">int</span> target) {

    <span class="kw">while</span> (l <= r) {

        <span class="kw">else if</span> (arr[mid] < target) l = mid + <span class="num">1</span>;
        <span class="kw">else</span> r = mid - <span class="num">1</span>;
    }
    <span class="kw">return</span> -<span class="num">1</span>;  <span class="cm">// l = insertion point</span>
}

}
<span class="kw">return</span> lo; <span class="cm">// minimum feasible answer</span>

<span class="cm">// Find First True in boolean array [F,F,F,T,T,T]</span>

<span class="kw">int</span> <span class="fn">maxDepth</span>(TreeNode root) {
    <span class="kw">if</span> (root == <span class="kw">null</span>) <span class="kw">return</span> <span class="num">0</span>;
    <span class="kw">return</span> <span class="num">1</span> + Math.<span class="fn">max</span>(<span class="fn">maxDepth</span>(root.left),
                           <span class="fn">maxDepth</span>(root.right));
}

<span class="cm">// Path Sum II (Backtracking)</span>
<span class="kw">void</span> <span class="fn">dfs</span>(TreeNode node, <span class="kw">int</span> remain, List&lt;Integer&gt; path,
         List&lt;List&lt;Integer&gt;&gt; res) {
    <span class="kw">if</span> (node == <span class="kw">null</span>) <span class="kw">return</span>;
    path.<span class="fn">add</span>(node.val);
    <span class="kw">if</span> (node.left == <span class="kw">null</span> && node.right == <span class="kw">null</span>
        && remain == node.val)
        res.<span class="fn">add</span>(<span class="kw">new</span> ArrayList&lt;&gt;(path));
    <span class="fn">dfs</span>(node.left,  remain - node.val, path, res);
    <span class="fn">dfs</span>(node.right, remain - node.val, path, res);
    path.<span class="fn">remove</span>(path.<span class="fn">size</span>() - <span class="num">1</span>); <span class="cm">// backtrack!</span>
}

<span class="cm">// LCA in BST</span>
TreeNode <span class="fn">lowestCommonAncestor</span>(TreeNode root, TreeNode p, TreeNode q) {
    <span class="kw">if</span> (p.val < root.val && q.val < root.val) <span class="kw">return</span> <span class="fn">lowestCommonAncestor</span>(root.left, p, q);
    <span class="kw">if</span> (p.val > root.val && q.val > root.val) <span class="kw">return</span> <span class="fn">lowestCommonAncestor</span>(root.right, p, q);
    <span class="kw">return</span> root;
}`,

<span class="kw">int</span>[][] <span class="fn">merge</span>(<span class="kw">int</span>[][] intervals) {

    <span class="kw">int</span>[] cur = intervals[<span class="num">0</span>];
    <span class="kw">for</span> (<span class="kw">int</span>[] iv : intervals) {
        <span class="kw">if</span> (iv[<span class="num">0</span>] <= cur[<span class="num">1</span>])               <span class="cm">// overlap</span>
            cur[<span class="num">1</span>] = Math.<span class="fn">max</span>(cur[<span class="num">1</span>], iv[<span class="num">1</span>]);

    }
    res.<span class="fn">add</span>(cur);
    <span class="kw">return</span> res.<span class="fn">toArray</span>(<span class="kw">new int</span>[<span class="num">0</span>][]);
}

<span class="cm">// Meeting Rooms II</span>
<span class="kw">int</span> <span class="fn">minMeetingRooms</span>(<span class="kw">int</span>[][] intervals) {
    Arrays.<span class="fn">sort</span>(intervals, (a, b) -> a[<span class="num">0</span>] - b[<span class="num">0</span>]);
    PriorityQueue&lt;Integer&gt; heap = <span class="kw">new</span> PriorityQueue&lt;&gt;();

        <span class="kw">if</span> (!heap.<span class="fn">isEmpty</span>() && heap.<span class="fn">peek</span>() <= m[<span class="num">0</span>])
            heap.<span class="fn">poll</span>();   <span class="cm">// reuse room</span>
        heap.<span class="fn">offer</span>(m[<span class="num">1</span>]);  <span class="cm">// add end time</span>
    }
    <span class="kw">return</span> heap.<span class="fn">size</span>();
}`,

<span class="kw">int</span> <span class="fn">findKthLargest</span>(<span class="kw">int</span>[] nums, <span class="kw">int</span> k) {

    <span class="kw">for</span> (<span class="kw">int</span> n : nums) {

        <span class="kw">if</span> (minH.<span class="fn">size</span>() > k) minH.<span class="fn">poll</span>(); <span class="cm">// remove min</span>
    }
    <span class="kw">return</span> minH.<span class="fn">peek</span>();  <span class="cm">// kth largest</span>
}

<span class="cm">// Top K Frequent Elements</span>
<span class="kw">int</span>[] <span class="fn">topKFrequent</span>(<span class="kw">int</span>[] nums, <span class="kw">int</span> k) {
    Map&lt;Integer, Integer&gt; freq = <span class="kw">new</span> HashMap&lt;&gt;();
    <span class="kw">for</span> (<span class="kw">int</span> n : nums) freq.<span class="fn">merge</span>(n, <span class="num">1</span>, Integer::sum);
    PriorityQueue&lt;Map.Entry&lt;Integer,Integer&gt;&gt; pq =
        <span class="kw">new</span> PriorityQueue&lt;&gt;((a, b) -> a.getValue() - b.getValue());
    <span class="kw">for</span> (<span class="kw">var</span> e : freq.<span class="fn">entrySet</span>()) {
        pq.<span class="fn">offer</span>(e);
        <span class="kw">if</span> (pq.<span class="fn">size</span>() > k) pq.<span class="fn">poll</span>();
    }
    <span class="kw">return</span> pq.<span class="fn">stream</span>().<span class="fn">mapToInt</span>(Map.Entry::getKey).<span class="fn">toArray</span>();
}`,

                code: `<span class="cm">// Subsets</span>
<span class="kw">void</span> <span class="fn">backtrack</span>(<span class="kw">int</span>[] nums, <span class="kw">int</span> start, List&lt;Integer&gt; path,

        <span class="kw">if</span> (used[i]) <span class="kw">continue</span>;
        used[i] = <span class="kw">true</span>;  path.<span class="fn">add</span>(nums[i]);
        <span class="fn">permute</span>(nums, used, path, res);

<span class="kw">int</span> <span class="fn">coinChange</span>(<span class="kw">int</span>[] coins, <span class="kw">int</span> amount) {
    <span class="kw">int</span>[] dp = <span class="kw">new int</span>[amount + <span class="num">1</span>];
    Arrays.<span class="fn">fill</span>(dp, amount + <span class="num">1</span>);  <span class="cm">// infinity</span>
    dp[<span class="num">0</span>] = <span class="num">0</span>;
    <span class="kw">for</span> (<span class="kw">int</span> i = <span class="num">1</span>; i <= amount; i++)
        <span class="kw">for</span> (<span class="kw">int</span> c : coins)
            <span class="kw">if</span> (c <= i) dp[i] = Math.<span class="fn">min</span>(dp[i], dp[i - c] + <span class="num">1</span>);
    <span class="kw">return</span> dp[amount] > amount ? -<span class="num">1</span> : dp[amount];
}

<span class="cm">// LIS — O(n²)</span>
<span class="kw">int</span> <span class="fn">lengthOfLIS</span>(<span class="kw">int</span>[] nums) {
    <span class="kw">int</span>[] dp = <span class="kw">new int</span>[nums.length];
    Arrays.<span class="fn">fill</span>(dp, <span class="num">1</span>);
    <span class="kw">int</span> max = <span class="num">1</span>;
    <span class="kw">for</span> (<span class="kw">int</span> i = <span class="num">1</span>; i < nums.length; i++) {
        <span class="kw">for</span> (<span class="kw">int</span> j = <span class="num">0</span>; j < i; j++)
            <span class="kw">if</span> (nums[j] < nums[i])
                dp[i] = Math.<span class="fn">max</span>(dp[i], dp[j] + <span class="num">1</span>);
        max = Math.<span class="fn">max</span>(max, dp[i]);
    }
    <span class="kw">return</span> max;
}

      <div class="code-box">
        <div class="code-header">
          <span class="code-lang">Java</span>
          <button class="copy-btn" onclick="copyCode(this)">Copy</button>
        </div>
        <pre>${p.code}</pre>
      </div>
    </div>

    <div class="problems-section">
      <div class="section-header" style="--c:${p.color}">
        <span class="section-num" style="background:${p.color}">practice</span>
        <h2>LeetCode Problems</h2>
      </div>
      <div class="prob-grid">
        ${p.problems.map(prob => `
          <div class="prob-item">
            <span class="prob-diff ${prob.diff}">${prob.diff === 'e' ? 'E' : prob.diff === 'm' ? 'M' : 'H'}</span>
            ${prob.name}
          </div>
        `).join('')}
      </div>
    </div>
  `;
            document.getElementById('lesson-content').innerHTML = html;
            // Init all steppers
            p.examples.forEach((ex, i) => {
                const key = `${p.id}_${i}`;
                exSteps[key] = 0;
                renderStep(p.id, i, ex, 0, p.color);
            });
        }

        function renderStep(pid, eidx, ex, stepIdx, color) {
            const step = ex.steps[stepIdx];
            const key = `${pid}_${eidx}`;

            // Render viz
            const vizEl = document.getElementById(`viz_${pid}_${eidx}`);
            if (vizEl) {
                let cellsHtml = '<div class="arr-viz">';
                step.arr.forEach((val, i) => {
                    let cls = 'arr-cell';
                    if (step.hi && step.hi.includes(i)) cls += ' active';
                    else if (step.win && step.win.length === 2 && i >= step.win[0] && i <= step.win[1]) cls += ' window';
                    else if (step.win && step.win.length > 2 && step.win.includes(i)) cls += ' window';
                    const lbl = step.label && step.label[i] ? `<span class="arr-label">${step.label[i]}</span>` : '';
                    cellsHtml += `<div class="${cls}">${val}${lbl}</div>`;
                });
                cellsHtml += `<div style="margin-left:auto;font-family:var(--mono);font-size:11px;color:${color};padding:4px 12px;background:rgba(255,255,255,0.03);border-radius:6px;border:1px solid var(--border)">${step.note}</div>`;
                cellsHtml += '</div>';
                vizEl.innerHTML = cellsHtml;
            }

            // Render desc
            const descEl = document.getElementById(`desc_${pid}_${eidx}`);
            if (descEl) descEl.innerHTML = step.desc;

            // Counter
            const scEl = document.getElementById(`sc_${pid}_${eidx}`);
            if (scEl) scEl.textContent = stepIdx + 1;

            // Dots
            ex.steps.forEach((_, si) => {
                const dot = document.getElementById(`dot_${pid}_${eidx}_${si}`);
                if (dot) dot.classList.toggle('active', si === stepIdx);
            });

            // Buttons
            const prevBtn = document.getElementById(`prev_${pid}_${eidx}`);
            const nextBtn = document.getElementById(`next_${pid}_${eidx}`);
            if (prevBtn) prevBtn.disabled = stepIdx === 0;
            if (nextBtn) nextBtn.disabled = stepIdx === ex.steps.length - 1;
        }

        function stepEx(pid, eidx, dir, color) {
            const key = `${pid}_${eidx}`;
            const p = PATTERNS.find(x => x.id === pid);
            const ex = p.examples[eidx];
            const newStep = Math.max(0, Math.min(ex.steps.length - 1, exSteps[key] + dir));
            exSteps[key] = newStep;
            renderStep(pid, eidx, ex, newStep, color);
        }

        function switchEx(btn, pid, idx, color) {
            // tabs
            btn.closest('.examples-section').querySelectorAll('.ex-tab').forEach(t => {
                t.classList.remove('active');
                t.style.removeProperty('--c');
            });
            btn.classList.add('active');
            btn.style.setProperty('--c', color);
            // panels
            btn.closest('.examples-section').querySelectorAll('.example-panel').forEach((p, i) => {
                p.classList.toggle('active', i === idx);
            });
        }

        function copyCode(btn) {
            const code = btn.closest('.code-box').querySelector('pre').innerText;
            navigator.clipboard.writeText(code).then(() => {
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 1500);
            });
        }

        // Scroll progress in lesson
        document.getElementById('lesson').addEventListener('scroll', function () {
            const el = this;
            const pct = el.scrollTop / (el.scrollHeight - el.clientHeight) * 100;
            document.querySelector('.progress-bar').style.width = pct + '%';
        });

        renderHome();
    </script>
</body>

</html>
